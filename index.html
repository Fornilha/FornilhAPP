<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FornilhApp</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --verm:#8B1A1A;--verm-d:#6B1212;--verm-m:#A02020;
  --ouro:#D4941A;--ouro-l:#F0B830;--ouro-p:#FDF3DC;
  --fogo:#E8650A;--tijolo:#A0431A;
  --bg:#F7F3EE;--surf:#FFFFFF;--surf2:#FDF8F2;
  --bord:rgba(139,26,26,0.12);--bord2:rgba(139,26,26,0.2);
  --txt:#1A0A0A;--txt2:#7A5A5A;--txt3:#B09090;
  --ok:#1D9E75;--ok-l:#E1F5EE;
  --av:#BA7517;--av-l:#FAEEDA;
  --er:#A32D2D;--er-l:#FCEBEB;
  --info:#185FA5;--info-l:#E6F1FB;
  --r:12px;--rl:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
.shell{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LOGIN */
#scr-login{background:linear-gradient(160deg,var(--verm-d) 0%,var(--verm) 50%,var(--tijolo) 100%);align-items:center;justify-content:center;padding:40px 24px}
.logo-mark{width:88px;height:88px;border-radius:22px;background:rgba(255,255,255,0.1);border:2px solid rgba(212,148,26,0.35);display:flex;align-items:center;justify-content:center;margin:0 auto 13px;font-size:36px}
.logo-nome{font-size:30px;font-weight:700;color:var(--ouro-l);font-style:italic;text-align:center}
.logo-sub{font-size:11px;color:rgba(255,255,255,0.45);text-align:center;margin-top:3px;letter-spacing:.07em;text-transform:uppercase;margin-bottom:26px}
.login-card{background:var(--surf);border-radius:var(--rl);padding:24px 20px;width:100%;box-shadow:0 8px 32px rgba(139,26,26,.18)}
.login-card h2{font-size:17px;font-weight:600;color:var(--verm);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--txt2);margin-bottom:18px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.fld input,.fld select{width:100%;padding:11px 13px;border:1.5px solid var(--bord);border-radius:10px;font-size:14px;color:var(--txt);background:var(--surf2);outline:none;transition:border-color .15s}
.fld input:focus,.fld select:focus{border-color:var(--ouro)}
.btn-p{width:100%;padding:13px;background:linear-gradient(135deg,var(--verm),var(--verm-m));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .15s}
.btn-p:hover{opacity:.92}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.login-ft{text-align:center;margin-top:14px;font-size:11px;color:rgba(255,255,255,.38)}
.login-err{background:var(--er-l);color:var(--er);border-radius:8px;padding:9px 12px;font-size:13px;margin-top:10px;display:none}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,var(--verm-d),var(--verm));padding:0 15px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(139,26,26,.3)}
.tb-l{display:flex;align-items:center;gap:9px}
.tb-logo{font-size:19px;font-weight:700;color:var(--ouro-l);font-style:italic}
.tb-pg{font-size:12px;color:rgba(255,255,255,.6)}
.tb-r{display:flex;align-items:center;gap:9px}
.ntf-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative}
.ntf-dot{position:absolute;top:5px;right:5px;width:8px;height:8px;background:var(--ouro-l);border-radius:50%;border:1.5px solid var(--verm)}
.av-sm{width:32px;height:32px;border-radius:50%;background:var(--ouro);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--verm-d);cursor:pointer;border:2px solid rgba(255,255,255,.25)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surf);border-top:1px solid var(--bord);display:flex;padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(139,26,26,.08)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 0;cursor:pointer;border:none;background:none;transition:all .15s}
.ni-ico{font-size:20px;line-height:1}
.ni-lbl{font-size:10px;font-weight:500;color:var(--txt3)}
.ni.active .ni-lbl{color:var(--verm);font-weight:700}
.ni.active .ni-ico{transform:scale(1.1)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:14px 14px 88px}

/* UTILS */
.card{background:var(--surf);border-radius:var(--r);border:1px solid var(--bord);margin-bottom:11px;overflow:hidden}
.cb{padding:13px 15px}
.slbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--txt2);margin-bottom:9px;padding-left:2px}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;flex-shrink:0}
.tag-r{background:var(--er-l);color:var(--er)} .tag-a{background:var(--av-l);color:var(--av)} .tag-g{background:var(--ok-l);color:var(--ok)} .tag-i{background:var(--info-l);color:var(--info)}

/* KPI */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
.kpi{background:var(--surf);border-radius:var(--r);border:1px solid var(--bord);padding:13px}
.kpi-l{font-size:11px;color:var(--txt2);font-weight:500;margin-bottom:3px}
.kpi-v{font-size:20px;font-weight:700;color:var(--txt);line-height:1}
.kpi-v.g{color:var(--ok)} .kpi-v.a{color:var(--ouro)} .kpi-v.r{color:var(--verm)}
.kpi-s{font-size:11px;color:var(--txt3);margin-top:2px}
.kpi.dest{background:linear-gradient(135deg,var(--verm-d),var(--verm));border:none}
.kpi.dest .kpi-l{color:rgba(255,255,255,.6)} .kpi.dest .kpi-v{color:var(--ouro-l)} .kpi.dest .kpi-s{color:rgba(255,255,255,.45)}

/* AI */
.ai-card{background:linear-gradient(135deg,var(--verm-d),#4A0808);border-radius:var(--r);padding:15px;margin-bottom:13px;border:1px solid rgba(212,148,26,.25)}
.ai-hd{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.ai-badge{background:var(--ouro);color:var(--verm-d);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.ai-title{font-size:13px;font-weight:600;color:var(--ouro-l)}
.ai-card p{font-size:13px;color:rgba(255,255,255,.82);line-height:1.6;min-height:40px}
.ai-inp{display:flex;gap:7px;margin-top:11px}
.ai-inp input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:13px;outline:none}
.ai-inp input::placeholder{color:rgba(255,255,255,.35)}
.ai-inp button{padding:9px 14px;background:var(--ouro);color:var(--verm-d);border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.ai-loading{display:none;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:rgba(255,255,255,.5)}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--ouro);animation:pulse .8s ease-in-out infinite}
.ai-dot:nth-child(2){animation-delay:.15s}.ai-dot:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* ALERT */
.alrt{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--bord)}
.alrt:last-child{border-bottom:none}
.alrt-ico{font-size:17px;flex-shrink:0}
.alrt-txt{font-size:13px;color:var(--txt);flex:1;line-height:1.4}

/* POST */
.post{background:var(--surf);border-radius:var(--r);border:1px solid var(--bord);margin-bottom:11px;overflow:hidden}
.ph{display:flex;align-items:center;gap:9px;padding:11px 13px 0}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.pa{font-size:13px;font-weight:600;color:var(--txt)} .pt{font-size:11px;color:var(--txt3)}
.ptb{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.pb{padding:9px 13px 13px;font-size:13px;color:var(--txt);line-height:1.6}
.phl{background:var(--ouro-p);border-radius:8px;padding:9px 11px;margin-top:7px;font-size:13px;border-left:3px solid var(--ouro)}
.pacts{display:flex;border-top:1px solid var(--bord)}
.pact{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;font-size:12px;color:var(--txt2);cursor:pointer;border:none;background:none;border-right:1px solid var(--bord)}
.pact:last-child{border-right:none}

/* TAREFA */
.tar{background:var(--surf);border-radius:var(--r);border:1px solid var(--bord);margin-bottom:9px;overflow:hidden}
.tar-h{display:flex;align-items:center;gap:9px;padding:11px 13px}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tar-i{flex:1;min-width:0}
.tar-t{font-size:14px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tar-m{font-size:11px;color:var(--txt2);margin-top:1px}
.sbadge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;flex-shrink:0}
.sp{background:var(--av-l);color:var(--av)} .sa{background:var(--info-l);color:var(--info)}
.sc{background:var(--ok-l);color:var(--ok)} .sat{background:var(--er-l);color:var(--er)} .sx{background:#f0f0f0;color:#999}
.tar-f{border-top:1px solid var(--bord);padding:9px 13px;display:flex;align-items:center;justify-content:space-between}
.tar-r{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2)}
.btn-tar{background:var(--verm);color:#fff;border:none;padding:6px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.fab{position:fixed;bottom:84px;right:calc(50% - 215px + 14px);width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--verm),var(--verm-m));color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(139,26,26,.4);display:flex;align-items:center;justify-content:center;z-index:50}

/* ESTOQUE / TABS */
.stabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:13px;padding-bottom:2px}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--bord);background:var(--surf);color:var(--txt2);cursor:pointer;transition:all .15s}
.stab.active{background:var(--verm);color:#fff;border-color:var(--verm)}
.prow{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--bord)}
.prow:last-child{border-bottom:none}
.pdotS{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pi{flex:1;min-width:0}
.pn{font-size:13px;font-weight:500;color:var(--txt)}
.pm2{font-size:11px;color:var(--txt2)}
.pbar{height:3px;background:#EEE;border-radius:2px;margin-top:3px;overflow:hidden;width:70px}
.pbf{height:100%;border-radius:2px}
.pq{font-size:15px;font-weight:700;text-align:right}
.pq.baixo{color:var(--ouro)} .pq.zero{color:var(--verm)}

/* VENDAS */
.mcard{background:linear-gradient(135deg,var(--verm-d),var(--verm));border-radius:var(--r);padding:17px;margin-bottom:13px}
.ml{font-size:12px;color:rgba(255,255,255,.6);font-weight:500;margin-bottom:3px}
.mv{font-size:26px;font-weight:700;color:var(--ouro-l)}
.ms{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
.mp{height:5px;background:rgba(255,255,255,.18);border-radius:3px;margin-top:13px;overflow:hidden}
.mpf{height:100%;background:var(--ouro-l);border-radius:3px}
.mes-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bord)}
.mes-row:last-child{border-bottom:none}
.mes-nome{font-size:13px;font-weight:600;color:var(--txt);width:40px}
.mes-bar-wrap{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.mes-bar{height:100%;border-radius:3px}
.mes-val{font-size:12px;font-weight:600;color:var(--txt);text-align:right;width:80px}
.mes-var{font-size:10px;width:44px;text-align:right;font-weight:600}
.rk{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--bord)}
.rk:last-child{border-bottom:none}
.rp{width:22px;height:22px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--txt2);flex-shrink:0}
.rp.g{background:var(--ouro-p);color:var(--ouro)}
.ri{flex:1} .rn{font-size:13px;font-weight:600;color:var(--txt)} .rv{font-size:12px;color:var(--txt2)}
.rval{font-size:14px;font-weight:700;color:var(--verm)}

/* MSGS */
.ci{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--bord);cursor:pointer}
.ci:last-child{border-bottom:none}
.cav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.cn{font-size:14px;font-weight:600;color:var(--txt)}
.cpv{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ct{font-size:11px;color:var(--txt3)} .cbadge{width:17px;height:17px;background:var(--verm);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}

/* NOTIF */
.ni2{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--bord)}
.ni2:last-child{border-bottom:none}
.ni2.unread{background:var(--ouro-p);margin:0 -14px;padding:11px 14px}
.ni-ic{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ni-txt{font-size:13px;color:var(--txt);line-height:1.5} .ni-tm{font-size:11px;color:var(--txt3);margin-top:2px}
.ni-ud{width:7px;height:7px;border-radius:50%;background:var(--verm);flex-shrink:0;margin-top:5px}

/* PERFIL */
.ph2{background:linear-gradient(160deg,var(--verm-d),var(--verm));padding:26px 18px 22px;text-align:center}
.av-lg{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--verm-d);margin:0 auto 11px;border:3px solid rgba(255,255,255,.25)}
.pnome{font-size:19px;font-weight:700;color:#fff} .pcargo{font-size:12px;color:var(--ouro-l);margin-top:2px}
.pstats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:13px}
.pst{background:var(--surf);padding:13px 7px;text-align:center}
.psv{font-size:18px;font-weight:700;color:var(--verm)} .psl{font-size:10px;color:var(--txt2);font-weight:500;margin-top:1px}
.mi{display:flex;align-items:center;gap:11px;padding:13px;border-bottom:1px solid var(--bord);cursor:pointer}
.mi:last-child{border-bottom:none}
.mi-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.mi-txt{flex:1;font-size:14px;font-weight:500;color:var(--txt)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--surf);border-radius:var(--rl);padding:22px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:4px}
.modal p{font-size:13px;color:var(--txt2);margin-bottom:14px;line-height:1.5}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;border:1px solid var(--bord);border-radius:8px;font-size:14px;margin-bottom:9px;color:var(--txt);background:var(--bg);outline:none;font-family:inherit}
.modal textarea{resize:none;height:75px}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--ouro)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mbtns{display:flex;gap:8px;margin-top:3px}
.btn-cancel{flex:1;padding:10px;border:1px solid var(--bord);background:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--txt)}
.btn-ok{flex:2;padding:10px;background:var(--verm);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-wpp{flex:2;padding:10px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--txt);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* INDICADOR BAR */
.ind-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bord)}
.ind-row:last-child{border-bottom:none}
.ind-lbl{font-size:12px;color:var(--txt2);width:130px;flex-shrink:0}
.ind-bar-w{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.ind-bar{height:100%;border-radius:3px}
.ind-val{font-size:12px;font-weight:700;width:48px;text-align:right;flex-shrink:0}

/* LOADING SCREEN */
#scr-loading{background:linear-gradient(160deg,var(--verm-d),var(--verm));align-items:center;justify-content:center}
.spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--ouro-l);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">

<!-- LOADING -->
<div class="screen active" id="scr-loading">
  <div style="text-align:center">
    <div class="spin"></div>
    <div style="color:var(--ouro-l);font-size:19px;font-weight:700;font-style:italic">Fornilha</div>
    <div style="color:rgba(255,255,255,.45);font-size:12px;margin-top:4px">Carregando...</div>
  </div>
</div>

<!-- LOGIN -->
<div class="screen" id="scr-login">
  <div class="logo-mark">🔥</div>
  <div class="logo-nome">Fornilha</div>
  <div class="logo-sub">Gestão interna · Ilha Grande/RJ</div>
  <div class="login-card">
    <h2 id="login-titulo">Bem-vindo de volta</h2>
    <p id="login-sub">Selecione seu usuário e digite sua senha.</p>
    <div class="fld" id="fld-usuario"><label>Usuário</label>
      <select id="l-codigo" autocomplete="username">
        <option value="">— Selecione seu usuário —</option>
        <option value="U1">Usuário 1 - Administrador</option>
        <option value="U2">Usuário 2 - Caixa</option>
        <option value="U3">Usuário 3 - Bar</option>
        <option value="U4">Usuário 4 - Vendedor</option>
        <option value="U5">Usuário 5 - Vendedor</option>
        <option value="U6">Usuário 6 - Vendedor</option>
        <option value="U7">Usuário 7 - Vendedor</option>
        <option value="U8">Usuário 8 - Pizzaria</option>
        <option value="U9">Usuário 9 - Pizzaria</option>
        <option value="U10">Usuário 10 - Pizzaria</option>
        <option value="U11">Usuário 11 - Cozinha</option>
        <option value="U12">Usuário 12 - Cozinha</option>
        <option value="U13">Usuário 13 - Cozinha</option>
        <option value="U14">Usuário 14 - Cozinha</option>

async function migrar2025() {
  if (!confirm('Isso vai inserir todos os lançamentos diários de 2025 no Supabase. Executar apenas UMA vez. Confirmar?')) return;
  const registros = [];
  Object.entries(DADOS_2025_DIARIOS).forEach(([mes, vals]) => {
    vals.forEach((fat, i) => {
      const dia = String(i+1).padStart(2,'0');
      registros.push({ data:`2025-${mes}-${dia}`, mes_ref:`2025-${mes}`, faturamento_bruto:fat, valor_taxa:0, created_by:'Migração 2025' });
    });
  });
  let ok=0, err=0;
  for (const r of registros) {
    const { error } = await db.from('lancamentos_diarios').upsert(r, {onConflict:'data'});
    error ? err++ : ok++;
  }
  alert(`Migração concluída: ${ok} registros inseridos, ${err} erros.`);
}

function _wppEstoque(setor, dados, responsavel) {
  const itens = ESTOQUE[setor] || [];
  const hora  = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const data  = new Date().toLocaleDateString('pt-BR');
  const zero=[], baixo=[], ok=[];
  itens.forEach(it => {
    const q = dados[it.n] !== undefined ? dados[it.n] : it.q;
    const linha = `• ${it.n}: *${q} ${it.un}*  _(mín ${it.min})_`;
    if (q === 0)        zero.push(linha);
    else if (q <= it.min) baixo.push(linha);
    else                ok.push(linha);
  });
  let msg = `📦 *CONTAGEM DE ESTOQUE — ${setor.toUpperCase()}*\n`;
  msg += `🏪 Fornilha Pizzaria\n`;
  msg += `📅 ${data} às ${hora}\n`;
  msg += `👤 Realizado por: ${responsavel}\n`;
  if (zero.length)  msg += `\n🔴 *SEM ESTOQUE:*\n${zero.join('\n')}`;
  if (baixo.length) msg += `\n\n🟡 *ESTOQUE BAIXO:*\n${baixo.join('\n')}`;
  if (ok.length)    msg += `\n\n✅ *OK:*\n${ok.join('\n')}`;
  msg += `\n\n_FornilhApp · Fornilha Pizzaria_`;
  window.open(`https://wa.me/5521991409144?text=${encodeURIComponent(msg)}`,'_blank');
}

async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    // Verifica se perfil está completo antes de entrar no app
    const { data: prof } = await db.from('profiles').select('perfil,nome').eq('id', session.user.id).single();
    if (!prof || !prof.perfil || !prof.nome) {
      // Perfil incompleto — faz logout e pede novo login para completar identificação
      await db.auth.signOut();
      mostrarLogin();
      return;
    }
    userSession = session;
    await carregarPerfil(session.user.id, session.user.email);
    await mostrarApp();
  } else {
    mostrarLogin();
  }

  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      if (window._loginAtivo) return; // entrar() já está gerenciando
      // Restauração de sessão (refresh da página) — verifica perfil
      const { data: prof } = await db.from('profiles').select('perfil,nome').eq('id', session.user.id).single();
      if (!prof || !prof.perfil || !prof.nome) return; // sem perfil completo, ignora
      userSession = session;
      await carregarPerfil(session.user.id, session.user.email);
      await mostrarApp();
    } else if (event === 'SIGNED_OUT') {
      mostrarLogin();
    }
  });
}

async function carregarPerfil(userId, email) {
  const { data } = await db.from('profiles').select('*').eq('id', userId).single();
  if (data) {
    userProfile = data;
    nome = data.nome || email.split('@')[0];
    perfil = data.perfil || (email === 'financeiro.fornilha@gmail.com' ? 'admin' : 'garcom');
  } else {
    nome = email === 'financeiro.fornilha@gmail.com' ? 'Vinicius' : email.split('@')[0];
    perfil = email === 'financeiro.fornilha@gmail.com' ? 'admin' : 'garcom';
  }
}

function codigoParaEmail(codigo) {
  if (codigo === 'U1') return 'financeiro.fornilha@gmail.com';
  const num = codigo.replace(/\D/g,'');
  return `u${num}@fornilha.app`;
}

async function entrar() {
  window._loginAtivo = true;
  const codigo = document.getElementById('l-codigo').value.trim().toUpperCase();
  const senha = document.getElementById('l-senha').value;
  const btn = document.getElementById('btn-entrar');
  if (!codigo) { window._loginAtivo=false; mostrarErroLogin('Selecione seu usuário.'); return; }
  if (!senha)  { window._loginAtivo=false; mostrarErroLogin('Digite sua senha.'); return; }
  const email = codigoParaEmail(codigo);
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  const { data, error } = await db.auth.signInWithPassword({ email, password: senha });
  if (error) {
    mostrarErroLogin('Usuário ou senha incorretos.');
    btn.disabled = false;
    btn.textContent = 'Entrar no FornilhApp';
    window._loginAtivo = false;
    return;
  }
  // Verifica se perfil está completo no banco
  const { data: prof } = await db.from('profiles').select('perfil,nome').eq('id', data.user.id).single();
  const primeiroAcesso = !prof || !prof.perfil || !prof.nome;
  if (primeiroAcesso) {
    document.getElementById('login-titulo').textContent = 'Bem-vindo!';
    document.getElementById('login-sub').textContent = 'Identifique-se na equipe e crie sua senha pessoal.';
    document.getElementById('l-senha').closest('.fld').style.display = 'none';
    document.getElementById('fld-apelido').style.display = 'block';
    document.getElementById('fld-nova-senha').style.display = 'block';
    document.getElementById('fld-conf-senha').style.display = 'block';
    document.getElementById('btn-entrar').style.display = 'none';
    document.getElementById('btn-criar-senha').style.display = 'block';
    document.getElementById('fld-usuario').style.display = 'none';
    document.getElementById('login-err').style.display = 'none';
    window._sessaoTemp = data.session;
    window._codigoLogin = codigo;
    const sel = document.getElementById('l-apelido');
    sel.innerHTML = '<option value="">— Selecione —</option>' +
      EQUIPE_LOCAL.map(e=>`<option value="${e.nome}">${e.nome.split(' ')[0]} — ${e.cargo}</option>`).join('');
    btn.disabled = false;
    btn.textContent = 'Entrar no FornilhApp';
    // _loginAtivo fica true até criarSenha() concluir
    return;
  }
  // Perfil completo — entra
  userSession = data.session;
  await carregarPerfil(data.user.id, data.user.email);
  window._loginAtivo = false;
  await mostrarApp();
}

async function criarSenha() {
  const colaboradorNome = document.getElementById('l-apelido').value;
  const nova = document.getElementById('l-nova-senha').value;
  const conf = document.getElementById('l-conf-senha').value;
  if (!colaboradorNome) { mostrarErroLogin('Selecione quem você é na equipe.'); return; }
  if (!nova || nova.length < 6) { mostrarErroLogin('A senha precisa ter pelo menos 6 caracteres.'); return; }
  if (nova !== conf) { mostrarErroLogin('As senhas não coincidem.'); return; }
  if (nova === SENHA_PADRAO) { mostrarErroLogin('Escolha uma senha diferente da padrão.'); return; }
  const btn = document.getElementById('btn-criar-senha');
  btn.disabled = true;
  btn.textContent = 'Salvando...';
  const colab = EQUIPE_LOCAL.find(e => e.nome === colaboradorNome);
  const { error } = await db.auth.updateUser({ password: nova, data: { nome: colaboradorNome } });
  if (error) {
    mostrarErroLogin('Erro: ' + (error.message || 'Tente novamente.'));
    btn.disabled = false;
    btn.textContent = 'Salvar e entrar';
    return;
  }
  const { data: { session } } = await db.auth.getSession();
  const nomeReal = colab?.nome || colaboradorNome;
  const perfilReal = colab?.perfil || 'garcom';
  const { error: upsertError } = await db.from('profiles').upsert({
    id: session.user.id,
    nome: nomeReal,
    cargo: colab?.cargo || '',
    perfil: perfilReal,
    telefone: colab?.tel || '',
    apelido: colaboradorNome.split(' ')[0],
    user_code: window._codigoLogin || ''
  }, { onConflict: 'id' });
  if (upsertError) {
    mostrarErroLogin('Erro ao salvar perfil: ' + (upsertError.message || 'Tente novamente.'));
    btn.disabled = false; btn.textContent = 'Salvar e entrar';
    window._loginAtivo = false; return;
  }
  nome = nomeReal;
  perfil = perfilReal;
  userProfile = { nome: nomeReal, perfil: perfilReal, cargo: colab?.cargo || '', apelido: colaboradorNome.split(' ')[0] };
  window._loginAtivo = false;
  userSession = session;
  await mostrarApp();
  showT('✅ Bem-vindo, ' + colaboradorNome.split(' ')[0] + '!');
}

function aplicarEstoqueDosTasks() {
  Object.keys(ESTOQUE).forEach(setor => {
    const concluidas = tarefas
      .filter(t => t.tipo === 'estoque' && t.setor === setor && t.status === 'concluida')
      .sort((a, b) => new Date(b.created_at||b.prazo) - new Date(a.created_at||a.prazo));
    if (!concluidas.length) return;
    const task = concluidas[0];
    const dados = task.dados || {};
    const ts = task.updated_at || task.created_at || null;
    ESTOQUE[setor].forEach(it => {
      if (dados[it.n] !== undefined) {
        it.prev_q = it.q;
        it.q = dados[it.n];
        it.last_count = ts;
      }
    });
  });
  saveEstoqueState();
}

async function sincronizarLancamentosDosTasks() {
  // Garante que toda tarefa de caixa concluída tenha lançamento em lancamentos_diarios
  const tarefasCaixa = tarefas.filter(t => t.tipo === 'caixa' && t.status === 'concluida' && t.dados?.data);
  if (!tarefasCaixa.length) return;
  const datas = tarefasCaixa.map(t => t.dados.data);
  const { data: existentes } = await db.from('lancamentos_diarios').select('data').in('data', datas);
  const datasExistentes = new Set((existentes || []).map(r => r.data));
  for (const t of tarefasCaixa) {
    if (datasExistentes.has(t.dados.data)) continue;
    const d = t.dados;
    await db.from('lancamentos_diarios').upsert({
      data: d.data, mes_ref: d.data.slice(0,7),
      faturamento_bruto: d.fat || 0, valor_taxa: d.taxa || 0,
      ausentes: d.ausentes || [], created_by: t.resp
    }, { onConflict: 'data' });
  }
}

  const lucroAcumAno = mesesFechados.reduce((s,d) => s + d.lucro, 0);
  const fatAcumFechado = mesesFechados.reduce((s,d) => s + d.fat, 0);
  const margemAcumAnoPct = fatAcumFechado > 0 ? (lucroAcumAno / fatAcumFechado * 100) : null;

  // ── Indicadores parciais do mês vigente ──
  // Despesas fixas mensais conhecidas (aluguel, energia, internet, etc.)
  const DESP_FIXAS_MES = 21230;
  const taxaAcumMes = dias.reduce((s,d) => s + Number(d.valor_taxa), 0);
  const taxaFuncAcum = taxaAcumMes * 0.75; // 75% da taxa vai para os funcionários
  const temDadosParciais = acumuladoMes > 0;
  const folhaParcPct = temDadosParciais ? (taxaFuncAcum / acumuladoMes * 100) : null;
  const fixParcPct = temDadosParciais ? (DESP_FIXAS_MES / acumuladoMes * 100) : null;
  const calcDespFixaAcum = () => pagamentos
    .filter(p => { const d = p.vencimento||(p.created_at||'').slice(0,10); return d.slice(0,7)===mesRef && p.tipo==='Boleto'; })
    .reduce((s,p) => s+Number(p.valor||0), 0);
  const calcDespVarAcum = () => pagamentos
    .filter(p => { const d = p.vencimento||(p.created_at||'').slice(0,10); return d.slice(0,7)===mesRef && p.tipo!=='Boleto' && p.tipo!=='Salário'; })
    .reduce((s,p) => s+Number(p.valor||0), 0);
  const calcImpostosAcum = () => acumuladoMes * (ref.imp_pct / 100);
  const calcMargemParcPct = () => temDadosParciais
    ? ((acumuladoMes - taxaFuncAcum - calcDespVarAcum() - calcDespFixaAcum() - calcImpostosAcum()) / acumuladoMes * 100)
    : null;
  const margemParcPct = calcMargemParcPct();

  function indCor(val,meta,inv=false){
    if(inv) return val<=meta*0.9?'#1D9E75':val<=meta?'#EF9F27':'#E24B4A';
    return val>=meta*0.9?'#1D9E75':val>=meta*0.7?'#EF9F27':'#E24B4A';
  }
  function indIcon(val,meta,inv=false){
    const ok=inv?val<=meta:val>=meta;
    const warn=inv?val<=meta*1.15:val>=meta*0.7;
    return ok?'🟢':warn?'🟡':'🔴';
  }

  const META_CMV=28, META_FIX=10, META_FOLHA=19, META_MARGEM=42, META_IMP=10, META_VAR=5;
  const corMargem = indCor(ref.margem,META_MARGEM);
  const corFolha  = indCor(ref.folha_pct,META_FOLHA,true);
  const corCMV    = indCor(ref.cmv_pct,META_CMV,true);
  const corFix    = indCor(ref.fix_pct,META_FIX,true);
  const corImp    = indCor(ref.imp_pct,META_IMP,true);
  const corVar    = indCor(ref.desp_var_pct,META_VAR,true);

  const podeLancar = perfil === 'admin' || perfil === 'caixa';

  // ── Checklist diário (só admin/caixa) ──
  function itemChecklist({ok, ico, titulo, detalhe, acao, onclick}) {
    if (ok) return `
      <div style="display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--bord)">
        <div style="width:34px;height:34px;border-radius:50%;background:var(--ok-l);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">${ico}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--txt)">${titulo}</div>
          <div style="font-size:11px;color:var(--ok);margin-top:1px">${detalhe}</div>
        </div>
        <span style="font-size:18px">✅</span>
      </div>`;
    return `
      <div style="display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--bord)">
        <div style="width:34px;height:34px;border-radius:50%;background:var(--av-l);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">${ico}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--txt)">${titulo}</div>
          <div style="font-size:11px;color:var(--av);margin-top:1px">Pendente</div>
        </div>
        <button onclick="${onclick}" style="background:var(--verm);color:#fff;border:none;padding:7px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0">${acao}</button>
      </div>`;
  }

  const diaCompleto = !!fatHoje && !!taxaHoje;
  const itensChecklist = [
    { ok: diaCompleto, ico: '📋', titulo: 'Lançamento do dia',
      detalhe: diaCompleto ? `${fmt(Number(fatHoje.faturamento_bruto))} · Taxa ${fmt(Number(taxaHoje.valor_taxa))}` : '',
      acao: 'Lançar', onclick: 'window._lancarDia()' },
  ];

  const totalItens = itensChecklist.length;
  const totalOk = itensChecklist.filter(i => i.ok).length;
  const todosOk = totalOk === totalItens;
  const pct = Math.round(totalOk/totalItens*100);

  const checklistHtml = podeLancar ? `
    <div class="card" style="margin-bottom:13px;overflow:hidden">
      <div style="padding:12px 15px 0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:13px;font-weight:700;color:var(--txt)">Lançamentos do dia</div>
          <div style="font-size:11px;font-weight:600;color:${todosOk?'var(--ok)':'var(--av)'}">${totalOk}/${totalItens} concluídos</div>
        </div>
        <div style="height:4px;background:var(--bg);border-radius:2px;margin-bottom:12px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${todosOk?'var(--ok)':'var(--ouro)'};border-radius:2px;transition:width .4s"></div>
        </div>
      </div>
      <div style="padding:0 15px 4px">
        ${itensChecklist.map(i => itemChecklist(i)).join('')}
        <div style="display:flex;align-items:center;gap:11px;padding:11px 0;cursor:pointer" onclick="goTo('financeiro')">
          <div style="width:34px;height:34px;border-radius:50%;background:#185FA522;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">💳</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:var(--txt)">Financeiro</div>
            <div style="font-size:11px;color:var(--txt2);margin-top:1px">Registrar pagamento ou boleto</div>
          </div>
          <span style="font-size:11px;color:#185FA5;padding:4px 9px;border:1px solid #185FA5;border-radius:20px">Abrir</span>
        </div>
      </div>
    </div>` : '';

  a.innerHTML=`
  <div style="padding:16px 0 8px"><p style="font-size:21px;font-weight:700">Olá, ${nome.split(' ')[0]} 👋</p><p style="font-size:13px;color:var(--txt2);margin-top:2px">${dt} · Baixa temporada</p></div>

  ${checklistHtml}

  <div class="kgrid">
    <div class="kpi dest">
      <div class="kpi-l">Acumulado ${nomeMes}</div>
      <div class="kpi-v">${acumuladoMes > 0 ? fmt(acumuladoMes) : '—'}</div>
      <div class="kpi-s">${dias.length} dia${dias.length!==1?'s':''} lançado${dias.length!==1?'s':''}</div>
    </div>
    <div class="kpi">
      <div class="kpi-l">Folha ${mesLabel} ${temDadosParciais?'<span style="font-size:9px;color:var(--av);font-weight:500">parcial</span>':''}</div>
      <div class="kpi-v" style="color:${temDadosParciais?indCor(folhaParcPct,META_FOLHA,true):'var(--txt3)'}">${temDadosParciais ? folhaParcPct.toFixed(1)+'%' : '—'}</div>
      <div class="kpi-s">${temDadosParciais ? fmt(taxaFuncAcum)+' · Meta: ≤'+META_FOLHA+'%' : 'Aguardando taxa'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-l">Desp. Variáveis ${nomeMes.slice(0,3).charAt(0).toUpperCase()+nomeMes.slice(1,3)}/26</div>
      <div class="kpi-v" style="color:var(--txt3)" id="ini-despvar-v">—</div>
      <div class="kpi-s" id="ini-despvar-s">Carregando...</div>
    </div>
    <div class="kpi">
      <div class="kpi-l">Desp. Fixas ${mesLabel}</div>
      <div class="kpi-v" style="color:${corFix}">${ref.fix_pct}%</div>
      <div class="kpi-s">${fmt(ref.fix_pct/100*ref.fat)} · Meta: ≤${META_FIX}%</div>
    </div>
  </div>

  <div class="ai-card">
    <div class="ai-hd"><span class="ai-badge">IA</span><span class="ai-title">Assistente Fornilha</span></div>
    <p id="ai-resp">Acumulado 2026: ${fmt(acumuladoAno)}. Mês atual (${nomeMes}): ${acumuladoMes > 0 ? fmt(acumuladoMes) + ' em ' + dias.length + ' dias lançados.' : 'nenhum faturamento lançado ainda.'} Indicadores baseados em ${mesLabel}.</p>
    <div class="ai-inp">
      <input id="ai-q" placeholder="Pergunte sobre o Fornilha..." onkeydown="if(event.key==='Enter')askAI()">
      <button onclick="askAI()">→</button>
    </div>
    <div class="ai-loading" id="ai-load"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span>Analisando...</span></div>
  </div>

  <div class="slbl">Indicadores ${mesLabel} vs metas</div>
  <div class="card"><div class="cb" style="padding-top:13px">
    <div class="ind-row">
      <span class="ind-lbl">Acumulado ${nomeMes}</span>
      <div class="ind-bar-w"><div class="ind-bar" style="width:${Math.min(Math.round((acumuladoMes||ref.fat)/ref.fat25*100),100)}%;background:${corMargem}"></div></div>
      <span class="ind-val" style="color:${corMargem}">${acumuladoMes > 0 ? fmt(acumuladoMes) : fmt(ref.fat)}</span>
    </div>
    <div class="ind-row">
      <span class="ind-lbl">Folha</span>
      <div class="ind-bar-w"><div class="ind-bar" style="width:${Math.min(ref.folha_pct/META_FOLHA*100,100)}%;background:${corFolha}"></div></div>
      <span class="ind-val" style="color:${corFolha}">${ref.folha_pct}% ${indIcon(ref.folha_pct,META_FOLHA,true)}</span>
    </div>
    <div class="ind-row">
      <span class="ind-lbl">Desp. Variáveis ${nomeMes}</span>
      <div class="ind-bar-w"><div class="ind-bar" id="ini-despvar-bar" style="width:0%;background:var(--bord)"></div></div>
      <span class="ind-val" id="ini-despvar-ind" style="color:var(--txt3)">— aguardando</span>
    </div>
    <div class="ind-row">
      <span class="ind-lbl">Despesas fixas ${nomeMes}</span>
      <div class="ind-bar-w"><div class="ind-bar" id="ini-despfix-bar" style="width:0%;background:var(--bord)"></div></div>
      <span class="ind-val" id="ini-despfix-ind" style="color:var(--txt3)">— aguardando</span>
    </div>
    <div class="ind-row">
      <span class="ind-lbl">Impostos</span>
      <div class="ind-bar-w"><div class="ind-bar" style="width:${Math.min(ref.imp_pct/META_IMP*100,100)}%;background:${corImp}"></div></div>
      <span class="ind-val" style="color:${corImp}">${ref.imp_pct}% ${indIcon(ref.imp_pct,META_IMP,true)}</span>
    </div>
    <div class="ind-row">
      <span class="ind-lbl">CMV ${mesLabel}</span>
      <div class="ind-bar-w"><div class="ind-bar" style="width:${Math.min(ref.cmv_pct/META_CMV*100,100)}%;background:${corCMV}"></div></div>
      <span class="ind-val" style="color:${corCMV}">${ref.cmv_pct}% ${indIcon(ref.cmv_pct,META_CMV,true)}</span>
    </div>
  </div></div>

  <div class="slbl">Resultado ${mesLabel} vs metas</div>
  <div class="card"><div class="cb" style="padding-top:13px">
    <div class="ind-row">
      <span class="ind-lbl">Margem Líquida ${nomeMes}</span>
      ${margemParcPct !== null
        ? (() => { const corM = indCor(margemParcPct, META_MARGEM); return `<div class="ind-bar-w"><div class="ind-bar" id="ini-margem-bar" style="width:${Math.min(Math.max(margemParcPct,0)/META_MARGEM*100,100)}%;background:${corM}"></div></div><span class="ind-val" id="ini-margem-ind" style="color:${corM}">${margemParcPct.toFixed(1)}% ${indIcon(margemParcPct,META_MARGEM)}</span>`; })()
        : `<div class="ind-bar-w"><div class="ind-bar" id="ini-margem-bar" style="width:0%;background:var(--bord)"></div></div><span class="ind-val" id="ini-margem-ind" style="color:var(--txt3)">— aguardando</span>`}
    </div>
    <div class="ind-row">
      <span class="ind-lbl">Margem Acum. ano</span>
      ${margemAcumAnoPct !== null ? (() => { const corM = indCor(margemAcumAnoPct, META_MARGEM); return `<div class="ind-bar-w"><div class="ind-bar" style="width:${Math.min(Math.max(margemAcumAnoPct,0)/META_MARGEM*100,100)}%;background:${corM}"></div></div><span class="ind-val" style="color:${corM}">${margemAcumAnoPct.toFixed(1)}% ${indIcon(margemAcumAnoPct,META_MARGEM)}</span>`; })() : `<div class="ind-bar-w"><div class="ind-bar" style="width:0%;background:var(--bord)"></div></div><span class="ind-val" style="color:var(--txt3)">—</span>`}
    </div>
    <div class="ind-row">
      <span class="ind-lbl">Acumulado ano</span>
      <div class="ind-bar-w"><div class="ind-bar" style="width:${Math.min(Math.round(acumuladoAno/2800000*100),100)}%;background:#1D9E75"></div></div>
      <span class="ind-val" style="color:#1D9E75">${varSinal}${varAno}% 🟢</span>
    </div>
  </div></div>

  <div class="slbl">Alertas operacionais</div>
  <div class="card"><div class="cb" style="padding-top:13px">
    ${ref.cmv_pct > META_CMV ? `<div class="alrt"><span class="alrt-ico">🔴</span><span class="alrt-txt">CMV em ${ref.cmv_pct}% em ${mesLabel} — limite crítico: ${META_CMV}%</span><span class="tag tag-r">Crítico</span></div>` : ''}
    ${ref.fix_pct > META_FIX ? `<div class="alrt"><span class="alrt-ico">🔴</span><span class="alrt-txt">Despesas fixas em ${ref.fix_pct}% em ${mesLabel} — acima da meta de ${META_FIX}%</span><span class="tag tag-r">Urgente</span></div>` : ''}
    ${ref.folha_pct > META_FOLHA ? `<div class="alrt"><span class="alrt-ico">🔴</span><span class="alrt-txt">Folha em ${ref.folha_pct}% em ${mesLabel} — limite crítico: ${META_FOLHA}%</span><span class="tag tag-r">Urgente</span></div>` : ''}
    ${margemParcPct !== null && margemParcPct < 20 ? `<div class="alrt"><span class="alrt-ico">🔴</span><span class="alrt-txt">Margem parcial em ${margemParcPct.toFixed(1)}% em ${nomeMes} — abaixo do mínimo de 20%</span><span class="tag tag-r">Crítico</span></div>` : ''}
    <div class="alrt"><span class="alrt-ico">📈</span><span class="alrt-txt">Acumulado 2026: ${fmt(acumuladoAno)} — ${varSinal}${varAno}% vs mesmo período 2025</span><span class="tag tag-i">Info</span></div>
  </div></div>`;

  // Atualiza Desp. Variáveis — chamado imediatamente e também pelo loadPagamentos quando terminar
  window._atualizarDespVarInicio = () => {
    const elV      = document.getElementById('ini-despvar-v');
    const elS      = document.getElementById('ini-despvar-s');
    const elBar    = document.getElementById('ini-despvar-bar');
    const elInd    = document.getElementById('ini-despvar-ind');
    const elFBar   = document.getElementById('ini-despfix-bar');
    const elFInd   = document.getElementById('ini-despfix-ind');
    const elMBar   = document.getElementById('ini-margem-bar');
    const elMInd   = document.getElementById('ini-margem-ind');
    if (!elV) { window._atualizarDespVarInicio = null; return; }

    // Desp. Variáveis (PIX, Extra, Reembolso, etc.)
    const despVar = calcDespVarAcum();
    if (acumuladoMes > 0) {
      const pct = despVar / acumuladoMes * 100;
      const cor = pct <= META_VAR ? '#1D9E75' : pct <= META_VAR * 1.5 ? '#BA7517' : '#E24B4A';
      elV.textContent = despVar > 0 ? pct.toFixed(1)+'%' : '—';
      elV.style.color = despVar > 0 ? cor : 'var(--txt3)';
      if (elS) elS.textContent = despVar > 0 ? fmt(despVar)+' · Meta: ≤'+META_VAR+'%' : 'Sem pagamentos variáveis';
      if (elBar) { elBar.style.width = Math.min(pct/META_VAR*100,100)+'%'; elBar.style.background = cor; }
      if (elInd) { elInd.textContent = despVar > 0 ? pct.toFixed(1)+'% '+(pct<=META_VAR?'🟢':pct<=META_VAR*1.5?'🟡':'🔴') : '— aguardando'; elInd.style.color = despVar > 0 ? cor : 'var(--txt3)'; }
    } else {
      elV.textContent = '—'; elV.style.color = 'var(--txt3)';
      if (elS) elS.textContent = 'Sem faturamento lançado';
    }

    // Desp. Fixas (Boletos)
    const despFix = calcDespFixaAcum();
    if (elFBar && elFInd && acumuladoMes > 0) {
      const pct = despFix / acumuladoMes * 100;
      const cor = pct <= META_FIX ? '#1D9E75' : pct <= META_FIX * 1.5 ? '#EF9F27' : '#E24B4A';
      elFBar.style.width = Math.min(pct/META_FIX*100,100)+'%';
      elFBar.style.background = cor;
      elFInd.textContent = despFix > 0 ? pct.toFixed(1)+'% '+(pct<=META_FIX?'🟢':pct<=META_FIX*1.5?'🟡':'🔴') : '— aguardando';
      elFInd.style.color = despFix > 0 ? cor : 'var(--txt3)';
    }

    // Margem Líquida parcial
    const mPct = calcMargemParcPct();
    if (mPct !== null && (elMBar || elMInd)) {
      const corM = mPct >= META_MARGEM*0.9 ? '#1D9E75' : mPct >= META_MARGEM*0.7 ? '#EF9F27' : '#E24B4A';
      const icoM = mPct >= META_MARGEM ? '🟢' : mPct >= META_MARGEM*0.7 ? '🟡' : '🔴';
      if (elMBar) { elMBar.style.width = Math.min(Math.max(mPct,0)/META_MARGEM*100,100)+'%'; elMBar.style.background = corM; }
      if (elMInd) { elMInd.textContent = mPct.toFixed(1)+'% '+icoM; elMInd.style.color = corM; }
    }
  };
  window._atualizarDespVarInicio();

  // Modal: lançamento unificado do dia (aceita lancamento existente para edição)
  window._lancarDia = function(lanc) {
    const isEdit = !!lanc;
    const dataDefault = isEdit ? lanc.data : hojeStr;
    const fatVal = isEdit ? Number(lanc.faturamento_bruto) : (fatHoje ? Number(fatHoje.faturamento_bruto) : '');
    const taxaVal = isEdit ? Number(lanc.valor_taxa) : (taxaHoje ? Number(taxaHoje.valor_taxa) : '');
    const ausentesAtuais = isEdit ? (lanc.ausentes || []) : (taxaHoje ? (taxaHoje.ausentes || []) : []);

    const checkboxes = COLABORADORES_FIN.map(c => `
      <label style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bord);cursor:pointer">
        <input type="checkbox" value="${c.nome}" ${ausentesAtuais.includes(c.nome)?'checked':''}
          onchange="window._atualizarPreviewTaxa()"
          style="width:17px;height:17px;cursor:pointer;accent-color:var(--verm)">
        <span style="font-size:13px;color:var(--txt)">${c.nome.split(' ').slice(0,2).join(' ')}</span>
        <span style="font-size:11px;color:var(--txt3);margin-left:auto">${c.cargo}</span>
      </label>`).join('');

    document.getElementById('modal-inner').innerHTML = `
      <h3>${isEdit ? 'Editar lançamento' : 'Lançamento do dia'}</h3>
      <p>${isEdit ? 'Corrija os dados e salve.' : 'Faturamento, taxa e presenças'}</p>
      <div class="fld"><label>Data</label>
        <input type="date" id="ld-data" value="${dataDefault}" max="${hojeStr}" ${isEdit ? '' : ''}>
      </div>
      <div class="row2">
        <div class="fld"><label>Faturamento bruto (R$)</label>
          <input type="number" id="ld-fat" placeholder="0,00" step="0.01" min="0" value="${fatVal}" oninput="window._atualizarPreviewTaxa()">
        </div>
        <div class="fld"><label>Taxa 10% total (R$)</label>
          <input type="number" id="ld-taxa" placeholder="0,00" step="0.01" min="0" value="${taxaVal}" oninput="window._atualizarPreviewTaxa()">
        </div>
      </div>
      <div class="fld"><label>Ausentes hoje</label>
        <div style="border:1px solid var(--bord);border-radius:8px;padding:0 10px;max-height:200px;overflow-y:auto">${checkboxes}</div>
      </div>
      <div id="ld-preview" style="background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--txt2);margin-bottom:8px;display:none"></div>
      <div id="ld-err" style="color:var(--er);font-size:12px;margin-bottom:8px;display:none"></div>
      <div class="mbtns">
        <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
        <button class="btn-ok" id="ld-btn" onclick="window._salvarDia()">Salvar</button>
      </div>`;
    document.getElementById('modal-bg').classList.add('open');
    window._atualizarPreviewTaxa();
    setTimeout(() => document.getElementById('ld-fat')?.focus(), 100);
  };

  window._atualizarPreviewTaxa = function() {
    const taxa = parseFloat(document.getElementById('ld-taxa')?.value) || 0;
    if (!taxa) { document.getElementById('ld-preview').style.display='none'; return; }
    const ausentes = [...document.querySelectorAll('#modal-inner input[type=checkbox]:checked')].map(c=>c.value);
    const total = COLABORADORES_FIN.length;
    const presentes = total - ausentes.length;
    if (presentes <= 0) { document.getElementById('ld-preview').style.display='none'; return; }
    const taxaFunc = taxa * 0.75;
    const porPessoa = taxaFunc / presentes;
    const prev = document.getElementById('ld-preview');
    prev.style.display = 'block';
    prev.innerHTML = `<strong>Presentes: ${presentes}/${total}</strong> · Taxa funcionários: R$ ${taxaFunc.toLocaleString('pt-BR',{minimumFractionDigits:2})} · <strong>Por pessoa: R$ ${porPessoa.toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong>`;
  };

  window._salvarDia = async function() {
    const btn = document.getElementById('ld-btn');
    const errEl = document.getElementById('ld-err');
    const dataVal = document.getElementById('ld-data').value;
    const fatVal = parseFloat(document.getElementById('ld-fat').value);
    const taxaVal = parseFloat(document.getElementById('ld-taxa').value);
    const ausentes = [...document.querySelectorAll('#modal-inner input[type=checkbox]:checked')].map(c=>c.value);
    if (!dataVal || isNaN(fatVal) || fatVal <= 0 || isNaN(taxaVal) || taxaVal <= 0) {
      errEl.textContent = 'Preencha a data, faturamento e taxa corretamente.';
      errEl.style.display = 'block'; return;
    }
    btn.disabled = true; btn.textContent = 'Salvando...';
    const mesRefSave = dataVal.slice(0,7);
    const { error: err } = await db.from('lancamentos_diarios').upsert(
      { data: dataVal, mes_ref: mesRefSave, faturamento_bruto: fatVal, valor_taxa: taxaVal, ausentes, created_by: nome },
      { onConflict: 'data' }
    );
    if (err) {
      errEl.textContent = 'Erro: ' + err.message;
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Salvar'; return;
    }
    fecharModal();
    showToast('Lançamento salvo ✅');
    renders.inicio(document.getElementById('content'));
  };
},

tarefas(a) {
  const cs = {pendente:'sp',concluida:'sc',cancelada:'sx'};
  const sl = {pendente:'Pendente',concluida:'Concluída',cancelada:'Cancelada'};
  let filtro = 'todas';
  const isAdmin = perfil === 'admin';
  const perfilSetor = {caixa:'Caixa',bar:'Bar',garcom:'Salão',pizzaria:'Pizzaria',cozinha:'Cozinha'};
  const meuSetor = perfilSetor[perfil] || null;

  function prazoFmt(p){ try{ return new Date(p+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); }catch(e){return p;} }

  function tarefasVisiveis() {
    let lista = isAdmin ? tarefas : tarefas.filter(t => t.setor === meuSetor);
    if (filtro === 'todas') lista = lista.filter(t => t.status !== 'cancelada');
    else lista = lista.filter(t => t.status === filtro);
    return lista;
  }

  function rList(){
    const lista = tarefasVisiveis();
    document.getElementById('tar-list').innerHTML = lista.length ? lista.map(t=>{
      const tp = TIPOS_TAR[t.tipo]||TIPOS_TAR.outro;
      const possoExecutar = isAdmin || t.setor === meuSetor;
      const pendente = t.status === 'pendente';
      const btnLabel = t.status==='concluida' ? 'Ver resultado' : (pendente && possoExecutar ? 'Preencher' : '');
      return `<div class="tar">
        <div class="tar-h">
          <div style="font-size:22px;margin-right:4px">${tp.icon}</div>
          <div class="tar-i">
            <div class="tar-t">${t.titulo}</div>
            <div class="tar-m">${t.setor} · ${t.resp} · Prazo: ${prazoFmt(t.prazo)}</div>
          </div>
          <span class="sbadge ${cs[t.status]||'sp'}">${sl[t.status]||t.status}</span>
        </div>
        <div class="tar-f" style="justify-content:flex-end;gap:8px">
          ${btnLabel ? `<button class="btn-tar" onclick="abrirTarefa('${t.id}')">${btnLabel}</button>` : ''}
          ${isAdmin && pendente ? `<button class="btn-tar" style="background:var(--danger,#E24B4A);color:#fff" onclick="cancelarTarefa('${t.id}')">Cancelar</button>` : ''}
        </div>
      </div>`;
    }).join('') : '<div style="text-align:center;padding:32px;color:var(--txt2);font-size:13px">Nenhuma tarefa.</div>';
  }

  a.innerHTML=`
  <div class="stabs">
    <button class="stab active" onclick="setF('todas',this)">Todas (${(isAdmin?tarefas:tarefas.filter(t=>t.setor===meuSetor)).filter(t=>t.status!=='cancelada').length})</button>
    <button class="stab" onclick="setF('pendente',this)">Pendentes (${(isAdmin?tarefas:tarefas.filter(t=>t.setor===meuSetor)).filter(t=>t.status==='pendente').length})</button>
    <button class="stab" onclick="setF('concluida',this)">Concluídas</button>
    ${isAdmin ? `<button class="stab" onclick="setF('cancelada',this)">Canceladas</button>` : ''}
  </div>
  <div id="tar-list"></div>`;

  window.setF=(f,el)=>{filtro=f;document.querySelectorAll('.stab').forEach(s=>s.classList.remove('active'));el.classList.add('active');rList()};
  window.cancelarTarefa=async(id)=>{
    if(!confirm('Cancelar esta tarefa?')) return;
    const t=tarefas.find(x=>String(x.id)===String(id)); if(!t) return;
    t.status='cancelada';
    await updateTarefa(id,{status:'cancelada'});
    rList();
    showT('Tarefa cancelada.');
  };

  window.excluirContagem=async(id)=>{
    if(!confirm('Excluir esta contagem? O estoque voltará ao estado anterior.')) return;
    const t=tarefas.find(x=>String(x.id)===String(id)); if(!t) return;
    const setor = t.setor;
    const tipo  = t.tipo;
    // 1. Salva no banco PRIMEIRO para garantir consistência após reload
    const { error } = await db.from('tarefas').update({status:'cancelada', dados:{}}).eq('id', id);
    if(error){ showT('⚠️ Erro ao excluir contagem: '+error.message); return; }
    // 2. Atualiza array local
    t.status='cancelada';
    t.dados={};
    // 3. Se for estoque, zera o setor e reaplica tarefas anteriores
    if(tipo==='estoque'){
      (ESTOQUE[setor]||[]).forEach(it=>{ it.q=0; it.prev_q=null; it.last_count=null; });
      aplicarEstoqueDosTasks();
    }
    fecharModal();
    rList();
    showT('Contagem excluída. Estoque revertido.');
    goTo('estoque');
  };

  window.calcTM=(manual=true)=>{
    const fat=parseFloat(document.getElementById('cf-fat')?.value)||0;
    const mesas=parseFloat(document.getElementById('cf-mesas')?.value)||0;

    const hint=document.getElementById('cf-tm-hint');

    const isAdmin=perfil==='admin';
    const concluida=t.status==='concluida';

    if(isAdmin && concluida){
      let resumo='';

      if(t.tipo==='caixa'){
        const dataFmt=d.data?new Date(d.data+'T12:00:00').toLocaleDateString('pt-BR'):'—';
        const ausentes=(d.ausentes||[]).map(n=>n.split(' ')[0]).join(', ')||'Nenhum';
        resumo=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bord)"><span>Data</span><strong>${dataFmt}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bord)"><span>Faturamento</span><strong>R$ ${(d.fat||0).toFixed(2).replace('.',',')}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bord)"><span>Taxa de serviço (equipe 75%)</span><strong>R$ ${((d.taxa||0)*0.75).toFixed(2).replace('.',',')}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bord)"><span style="color:var(--txt3);font-size:12px">Taxa bruta (100%)</span><span style="color:var(--txt3);font-size:12px">R$ ${(d.taxa||0).toFixed(2).replace('.',',')}</span></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0"><span>Ausentes</span><strong>${ausentes}</strong></div>`;
      } else if(t.tipo==='producao'){
        if(t.setor==='Cozinha'){
          resumo=Object.entries(PRODUCAO_COZINHA).map(([massa,sabs])=>`
            <div style="font-size:12px;font-weight:700;color:var(--txt2);margin:8px 0 4px">${massa}</div>
            ${sabs.map(s=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--bord)"><span style="font-size:13px">${s}</span><strong>${d[massa+'_'+s]||0} unid</strong></div>`).join('')}`).join('');
        } else {
          resumo=PRODUCAO_PIZZARIA.map(it=>`<div style="display:flex;justify-content:space-between;padding:5px 0"><span>${it.n}</span><strong>${d[it.n]||0} ${it.un}</strong></div>`).join('');
        }
      } else if(t.tipo==='estoque'){
        resumo=(ESTOQUE[t.setor]||[]).map(it=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bord)"><span>${it.n}</span><strong>${d[it.n]!==undefined?d[it.n]:it.q} ${it.un}</strong></div>`).join('');
      } else {
        resumo=`<p style="color:var(--txt2)">${d.obs||'Sem observação.'}</p>`;
      }
      const btnExcluir = (t.tipo==='estoque'||t.tipo==='producao')
        ? `<button class="btn-cancel" style="width:100%;margin-top:8px;background:var(--verm);color:#fff" onclick="excluirContagem('${t.id}')">🗑 Excluir contagem</button>`
        : '';
      document.getElementById('modal-inner').innerHTML=`
        <h3>${tp.icon} ${t.titulo}</h3>
        <p style="color:var(--ok);font-weight:600">Concluída · ${t.resp}</p>
        <div style="margin-top:8px">${resumo}</div>
        <button class="btn-cancel" style="width:100%;margin-top:14px" onclick="fecharModal()">Fechar</button>
        ${btnExcluir}`;
      document.getElementById('modal-bg').classList.add('open');
      return;
    }

    let formHtml='';
    if(t.tipo==='caixa'){
      const ausFields=COLABORADORES_FIN.map(c=>`
        <label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;cursor:pointer">
          <input type="checkbox" id="aus_${c.nome.replace(/\s/g,'_')}" style="width:16px;height:16px">
          ${c.nome.split(' ')[0]}
        </label>`).join('');
      formHtml=`
        <div class="fld"><label>Data do movimento</label><input type="date" id="cf-data" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="fld"><label>Faturamento do dia (R$)</label><input type="number" id="cf-fat" placeholder="0,00" min="0" step="0.01"></div>
        <div class="fld"><label>Taxa de serviço do dia (R$)</label><input type="number" id="cf-taxa" placeholder="0,00" min="0" step="0.01"></div>
        <div class="fld"><label>Ausentes no dia</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;margin-top:4px">${ausFields}</div></div>`;
    } else if(t.tipo==='producao'){
      if(t.setor==='Cozinha'){
        formHtml=Object.entries(PRODUCAO_COZINHA).map(([massa,sabs])=>`
          <div class="slbl" style="margin:12px 0 6px">${massa}</div>
          ${sabs.map(s=>`<div class="fld"><label>${s}</label><input type="number" id="prod_${massa}_${s.replace(/\s/g,'_')}" placeholder="0" min="0"></div>`).join('')}`).join('');
      } else {
        formHtml=PRODUCAO_PIZZARIA.map(it=>`
          <div class="fld"><label>${it.n} (${it.un})</label><input type="number" id="prod_${it.n.replace(/\s/g,'_')}" placeholder="0" min="0" step="${it.un==='kg'?'0.1':'1'}"></div>`).join('');
      }
    } else if(t.tipo==='estoque'){
      const itens=ESTOQUE[t.setor]||[];
      formHtml=itens.map(it=>`
        <div class="fld"><label>${it.n} <span style="color:var(--txt3);font-weight:400">(atual: ${it.q} ${it.un})</span></label>
          <input type="number" id="est_${it.n.replace(/[\s\/]/g,'_')}" placeholder="${it.q}" min="0" step="${it.un==='kg'?'0.1':'1'}">
        </div>`).join('');
    } else {
      formHtml=`<div class="fld"><label>Observação / resultado</label><textarea id="outro-obs" placeholder="Descreva o que foi feito..." rows="4"></textarea></div>`;
    }

    document.getElementById('modal-inner').innerHTML=`
      <h3>${tp.icon} ${t.titulo}</h3>
      <p style="font-size:13px;color:var(--txt2)">Responsável: <strong>${t.resp}</strong> · Prazo: ${prazoFmt(t.prazo)}</p>
      ${formHtml}
      <div class="mbtns">
        <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
        <button class="btn-ok" onclick="concluirTarefa('${id}')">Enviar</button>
      </div>`;
    document.getElementById('modal-bg').classList.add('open');
  };

  window.concluirTarefa=async(id)=>{
    const t=tarefas.find(x=>String(x.id)===String(id)); if(!t)return;
    const dados={};
    if(t.tipo==='caixa'){
      dados.data=document.getElementById('cf-data').value||new Date().toISOString().slice(0,10);
      dados.fat=parseFloat(document.getElementById('cf-fat').value)||0;
      dados.taxa=parseFloat(document.getElementById('cf-taxa').value)||0;
      dados.ausentes=COLABORADORES_FIN.filter(c=>document.getElementById('aus_'+c.nome.replace(/\s/g,'_'))?.checked).map(c=>c.nome);
      // Salva também em lancamentos_diarios para refletir em Início e Vendas
      const mesRef=dados.data.slice(0,7);
      const { error: lancErr } = await db.from('lancamentos_diarios').upsert({
        data: dados.data, mes_ref: mesRef,
        faturamento_bruto: dados.fat, valor_taxa: dados.taxa,
        ausentes: dados.ausentes, created_by: nome
      }, { onConflict: 'data' });
      if (lancErr) showT('⚠️ Erro ao salvar lançamento: ' + lancErr.message);
    } else if(t.tipo==='producao'){
      if(t.setor==='Cozinha'){
        Object.entries(PRODUCAO_COZINHA).forEach(([massa,sabs])=>{
          sabs.forEach(s=>{ dados[massa+'_'+s]=parseInt(document.getElementById('prod_'+massa+'_'+s.replace(/\s/g,'_'))?.value)||0; });
        });
      } else {
        PRODUCAO_PIZZARIA.forEach(it=>{ dados[it.n]=parseFloat(document.getElementById('prod_'+it.n.replace(/\s/g,'_'))?.value)||0; });
      }
    } else if(t.tipo==='estoque'){
      const agora = new Date().toISOString();
      (ESTOQUE[t.setor]||[]).forEach(it=>{
        const v=parseFloat(document.getElementById('est_'+it.n.replace(/[\s\/]/g,'_'))?.value);
        const novoQ = isNaN(v) ? it.q : v;
        dados[it.n] = novoQ;
        it.prev_q = it.q;
        it.q = novoQ;
        it.last_count = agora;
      });
      saveEstoqueState();
    } else {
      dados.obs=document.getElementById('outro-obs')?.value||'';
    }
    t.status='concluida';
    t.dados=dados;
    // Para estoque: abre WhatsApp ANTES do await (garante gesto do usuário ativo)
    if (t.tipo === 'estoque') _wppEstoque(t.setor, dados, t.resp);
    await updateTarefa(t.id, { status: 'concluida', dados });
    const tp=TIPOS_TAR[t.tipo]||TIPOS_TAR.outro;
    posts.unshift({autor:nome,cargo:'Gestão',cor:EQUIPE_LOCAL.find(e=>e.nome===nome)?.cor||'#8B1A1A',
      badge:'tag-g',bl:'Concluído',setor:t.setor,
      txt:`${tp.icon} <strong>${t.titulo}</strong> concluída por ${t.resp}.`,
      mediaUrl:'',mediaName:'',extra:'',time:'Agora'});
    fecharModal();
    if (t.tipo === 'estoque') { showT('✅ Estoque atualizado!'); goTo('estoque'); }
    else { rList(); showT('Enviado com sucesso!'); }
  };

  rList();
  if(perfil==='admin'){
    const fab=document.createElement('button');
    fab.className='fab';fab.textContent='+';fab.onclick=abrirNovaTarefa;
    document.querySelector('.shell').appendChild(fab);
  }
},
estoque(a) {
  let sel='Pizzaria';
  function fmtDate(iso){
    if(!iso)return null;
    const d=new Date(iso);
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+'  '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  function rEst(){
    const prods=ESTOQUE[sel];
    const lastDates=[...new Set(prods.filter(p=>p.last_count).map(p=>p.last_count))].sort().reverse();
    const lastCount=lastDates.length?fmtDate(lastDates[0]):null;
    document.getElementById('est-last').textContent=lastCount?`Última contagem: ${lastCount}`:'Nenhuma contagem realizada ainda';

    document.getElementById('est-lista').innerHTML=prods.map(p=>{
      const cor=p.q===0?'#E24B4A':p.q<=p.min?'#EF9F27':'#1D9E75';
      const pct=Math.min(100,Math.round(p.q/p.max*100));
      let deltaHtml='';
      if(p.prev_q!==null && p.prev_q!==undefined){
        const diff=p.q-p.prev_q;
        if(diff!==0){
          const dCor=diff>0?'#1D9E75':'#E24B4A';
          const dIcon=diff>0?'↑':'↓';
          deltaHtml=`<span style="font-size:11px;font-weight:700;color:${dCor};background:${dCor}18;border-radius:6px;padding:1px 5px;margin-left:5px">${diff>0?'+':''}${diff} ${dIcon}</span>`;
        }
      }
      return `<div class="prow" style="padding:10px 4px;align-items:center">
        <div class="pdotS" style="background:${cor};flex-shrink:0"></div>
        <div class="pi" style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">
            <span class="pn">${p.n}</span>${deltaHtml}
          </div>
          <div class="pm2" style="margin:2px 0 4px">Mín: ${p.min} · Máx: ${p.max} ${p.un}</div>
          <div class="pbar"><div class="pbf" style="width:${pct}%;background:${cor}"></div></div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:10px">
          <div class="pq${p.q===0?' zero':p.q<=p.min?' baixo':''}" style="font-size:20px">${p.q}</div>
          <div style="font-size:10px;color:var(--txt3)">${p.un}</div>
        </div>
      </div>`;
    }).join('');

    const zero=prods.filter(p=>p.q===0).length;
    const baixo=prods.filter(p=>p.q>0&&p.q<=p.min).length;
    const ok=prods.filter(p=>p.q>p.min).length;
    const semCount=prods.filter(p=>p.last_count===null||p.last_count===undefined).length;
    document.getElementById('est-resumo').innerHTML=
      `<span style="color:#1D9E75">✅ ${ok} ok</span>&nbsp;&nbsp;`+
      (baixo?`<span style="color:#EF9F27">🟡 ${baixo} baixo</span>&nbsp;&nbsp;`:'')+
      (zero?`<span style="color:#E24B4A">🔴 ${zero} zerado</span>&nbsp;&nbsp;`:'')+
      (semCount?`<span style="color:var(--txt3)">📋 ${semCount} sem contagem</span>`:'');
  }
  function rProd(){
    const taskProd = [...tarefas]
      .filter(t=>t.tipo==='producao' && t.status==='concluida')
      .sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at));
    const html = document.getElementById('est-lista');
    const last = document.getElementById('est-last');
    const resumo = document.getElementById('est-resumo');
    if(!taskProd.length){
      if(last) last.textContent='Nenhuma produção registrada ainda';
      if(resumo) resumo.textContent='';
      if(html) html.innerHTML='<div style="text-align:center;padding:24px;color:var(--txt3);font-size:13px">Nenhuma tarefa de produção concluída.</div>';
      return;
    }
    const t = taskProd[0];
    const d = t.dados||{};
    const dataFmt = new Date(t.updated_at||t.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})
      +' '+new Date(t.updated_at||t.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    if(last) last.textContent=`Última produção: ${dataFmt} · ${t.resp}`;
    if(resumo) resumo.textContent='';
    let inner='';
    if(t.setor==='Cozinha'){
      inner=Object.entries(PRODUCAO_COZINHA).map(([massa,sabs])=>`
        <div style="font-size:11px;font-weight:700;color:var(--txt2);padding:8px 4px 4px;text-transform:uppercase;letter-spacing:1px">${massa}</div>
        ${sabs.map(s=>{const v=d[massa+'_'+s]||0;return`<div class="prow" style="padding:7px 4px;align-items:center">
          <div class="pdotS" style="background:${v>0?'#1D9E75':'var(--txt3)'};flex-shrink:0"></div>
          <div class="pi" style="flex:1"><span class="pn">${s}</span></div>
          <div style="font-size:20px;font-weight:700;color:${v>0?'var(--txt)':'var(--txt3)'}">${v}</div>
          <div style="font-size:10px;color:var(--txt3);margin-left:4px">unid</div>
        </div>`}).join('')}`).join('');
    } else {
      inner=PRODUCAO_PIZZARIA.map(it=>{const v=d[it.n]||0;return`<div class="prow" style="padding:7px 4px;align-items:center">
        <div class="pdotS" style="background:${v>0?'#1D9E75':'var(--txt3)'};flex-shrink:0"></div>
        <div class="pi" style="flex:1"><span class="pn">${it.n}</span></div>
        <div style="font-size:20px;font-weight:700;color:${v>0?'var(--txt)':'var(--txt3)'}">${v}</div>
        <div style="font-size:10px;color:var(--txt3);margin-left:4px">${it.un}</div>
      </div>`}).join('');
    }
    if(html) html.innerHTML=inner;
  }

  a.innerHTML=`

  <div style="font-size:11px;color:var(--txt3);padding:0 2px 4px" id="est-last"></div>

  <div class="card"><div class="cb" id="est-lista"></div></div>
  <button class="btn-p" style="background:linear-gradient(135deg,#25D366,#1aad53);margin-top:8px" onclick="envWpp()">📱 Enviar resumo por WhatsApp</button>`;
  window.selSet=(s,el)=>{sel=s;document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));el.classList.add('active');sel==='Produção'?rProd():rEst()};
  window.envWpp=()=>{

},

async vendas(a) {
  const hoje = new Date();
  const mesIdx = hoje.getMonth();
  const anoAtual = hoje.getFullYear();
  const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const mesNome = MESES[mesIdx] + '/' + String(anoAtual).slice(2);
  const mesRef = hoje.toISOString().slice(0,7);
  const diasNoMes = new Date(anoAtual, mesIdx+1, 0).getDate();
  const fmtR = v => 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

  // Estrutura de tabs — content renderizado no #vnd-content
  a.innerHTML = `
  <div style="display:flex;gap:6px;padding:12px 0 4px;overflow-x:auto;scrollbar-width:none;flex-shrink:0">
    <button id="vnd-tab-fat" onclick="window._vndTab('fat')"
      style="flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--verm);background:var(--verm);color:#fff;font-size:12px;font-weight:700;cursor:pointer">
      📊 Faturamento</button>
    <button id="vnd-tab-taxa" onclick="window._vndTab('taxa')"
      style="flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--bord);background:var(--surf);color:var(--txt);font-size:12px;font-weight:700;cursor:pointer">
      🪙 Taxa 10%</button>
  </div>
  <div id="vnd-content"></div>`;

  function setVndTab(id) {
    ['fat','taxa'].forEach(t => {
      const b = document.getElementById('vnd-tab-'+t);
      if (!b) return;
      const active = t === id;
      b.style.background = active ? 'var(--verm)' : 'var(--surf)';
      b.style.color = active ? '#fff' : 'var(--txt)';
      b.style.borderColor = active ? 'var(--verm)' : 'var(--bord)';
    });
  }

  async function renderFaturamento() {
    setVndTab('fat');
    const content = document.getElementById('vnd-content');
    if (!content) return;

    const { data: lancMes } = await db.from('lancamentos_diarios')
      .select('*').eq('mes_ref', mesRef).order('data', {ascending:true});
    const dias = lancMes || [];
    const semDados = dias.length === 0;

    const dadosMes = DADOS_2026[mesIdx];
    const acumMes = dias.length > 0
      ? dias.reduce((s,d) => s + Number(d.faturamento_bruto), 0)
      : (dadosMes?.fat || 0);
    const acumAno = DADOS_2026.slice(0, mesIdx).reduce((s,d) => s + d.fat, 0) + acumMes;

    const q1dias = dias.filter(d => parseInt(d.data.split('-')[2]) <= 15);
    const q2dias = dias.filter(d => parseInt(d.data.split('-')[2]) > 15);
    const taxaQ1 = semDados ? (dadosMes?.taxa_q1||0)*0.75 : q1dias.reduce((s,d)=>s+Number(d.valor_taxa),0)*0.75;
    const taxaQ2 = semDados ? (dadosMes?.taxa_q2||0)*0.75 : q2dias.reduce((s,d)=>s+Number(d.valor_taxa),0)*0.75;
    const taxaTotal = taxaQ1 + taxaQ2;
    const taxaAcumAno = DADOS_2026.slice(0, mesIdx).reduce((s,d)=>s+((d.taxa_q1||0)+(d.taxa_q2||0)),0)*0.75 + taxaTotal;

    const dadosHist = DADOS_2026.map((d,i) => i===mesIdx&&dias.length>0 ? {...d,fat:acumMes,margem:null} : d);
    const maxFat = Math.max(...dadosHist.filter(d=>d.fat>0).map(d=>d.fat));
    const mesesRows = dadosHist.map((d,i) => {
      if (d.fat===0) return `<div class="mes-row"><span class="mes-nome" style="color:var(--txt3)">${d.mes}</span><div class="mes-bar-wrap"></div><span class="mes-val" style="color:var(--txt3)">—</span><span class="mes-var" style="color:var(--txt3)">—</span></div>`;
      const pct=Math.round(d.fat/maxFat*100);
      const isV=i===mesIdx&&dias.length>0;
      const cor=isV?'#185FA5':(d.margem>=30?'#1D9E75':d.margem>=20?'#EF9F27':'#E24B4A');
      const varStr=isV?`<span class="mes-var" style="color:var(--acc)">${dias.length}d</span>`:
        (()=>{const vr=Math.round((d.fat/d.fat25-1)*100);return`<span class="mes-var" style="color:${vr>0?'var(--ok)':'var(--er)'}">${vr>0?'▲':'▼'}${Math.abs(vr)}%</span>`;})();
      return `<div class="mes-row"><span class="mes-nome" style="font-weight:600;${isV?'color:var(--acc)':''}">${d.mes}${isV?' ●':''}</span><div class="mes-bar-wrap"><div class="mes-bar" style="width:${pct}%;background:${cor}"></div></div><span class="mes-val">${fmt(d.fat)}</span>${varStr}</div>`;
    }).join('');

    const kpiCard=(label,val,sub,cor='var(--acc)')=>`
      <div style="background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:14px 16px">
        <div style="font-size:11px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${label}</div>
        <div style="font-size:22px;font-weight:800;color:${cor};line-height:1.1">${val}</div>
        ${sub?`<div style="font-size:11px;color:var(--txt3);margin-top:3px">${sub}</div>`:''}
      </div>`;

    content.innerHTML = `
    <div class="mcard" style="margin-bottom:12px">
      <div class="ml">Faturamento acumulado 2026</div>
      <div class="mv">${fmt(acumAno)}</div>
      <div class="ms">Meta 2030: R$ 5M</div>
      <div class="mp"><div class="mpf" style="width:${Math.min(100,Math.round(acumAno/5000000*100))}%"></div></div>
      <div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:5px">${Math.round(acumAno/5000000*100)}% da meta</div>
    </div>

    <div class="slbl">Mês vigente — ${mesNome}</div>
    ${semDados ? `<div class="card" style="margin-bottom:12px"><div class="cb" style="text-align:center;padding:18px 8px;color:var(--txt3);font-size:13px">Nenhum lançamento em ${mesNome} ainda.<br><span style="font-size:11px">Use o botão Lançar na tela Início.</span></div></div>` : `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px">
      ${kpiCard('Acumulado '+mesNome, fmt(acumMes), `${dias.length} dia${dias.length!==1?'s':''} lançado${dias.length!==1?'s':''}`)}
      ${kpiCard('Dias lançados', dias.length, hoje.getDate()>dias.length?`${hoje.getDate()-dias.length} sem dado`:'Em dia ✅', dias.length<hoje.getDate()?'var(--av)':'var(--ok)')}
    </div>
    <div class="slbl">Faturamento dia a dia — ${mesNome}</div>
    <div class="card" style="margin-bottom:12px"><div class="cb" style="padding-top:4px">
      ${dias.slice().reverse().map(d=>{
        const dt=new Date(d.data+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
        return `<div class="alrt"><span class="alrt-ico">💰</span><span class="alrt-txt">${dt}</span><strong>${fmt(Number(d.faturamento_bruto))}</strong></div>`;
      }).join('')}
    </div></div>`}

    <div class="slbl">Taxa de serviço (equipe 75%) — ${mesNome}</div>
    <div class="card" style="margin-bottom:12px"><div class="cb">
      ${semDados?`<div style="font-size:11px;color:var(--txt3);padding:6px 0 10px">Dados históricos de ${mesNome}</div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bord)">
        <span style="font-size:13px">1ª Quinzena (1–15/${mesNome.slice(0,3)})</span><strong>${fmtR(taxaQ1)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bord)">
        <span style="font-size:13px">2ª Quinzena (16–${diasNoMes}/${mesNome.slice(0,3)})</span><strong>${fmtR(taxaQ2)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bord)">
        <span style="font-size:13px;font-weight:700">Total taxa ${mesNome}</span><strong style="color:var(--acc)">${fmtR(taxaTotal)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0">
        <span style="font-size:13px;font-weight:700">Acumulado taxa 2026</span><strong style="color:var(--ok)">${fmtR(taxaAcumAno)}</strong>
      </div>
    </div></div>

    <div class="slbl">Histórico mensal 2026 vs 2025</div>
    <div class="card"><div class="cb" style="padding-top:13px">${mesesRows}</div></div>`;
  }

  window._vndTab = async (tab) => {
    if (tab === 'fat') {
      await renderFaturamento();
    } else {
      setVndTab('taxa');
      const content = document.getElementById('vnd-content');
      if (content) await renders.taxa(content);
    }
  };

  await renderFaturamento();
},

msgs(a) {
  const DIAS_PT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  function fmtMsgTime(iso){
    if(!iso)return'';
    const d=new Date(iso),hoje=new Date();
    const isHoje=d.toDateString()===hoje.toDateString();
    return isHoje?d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  }
  function rMsgs(){
    const visíveis=perfil==='admin'?mensagens:mensagens.filter(m=>m.para==='todos'||m.para===nome);

      a.querySelector('#msgs-lista').innerHTML=`<div style="text-align:center;color:var(--txt3);padding:32px 0;font-size:13px">Nenhuma mensagem ainda.</div>`;

    <div class="card"><div class="cb" style="padding:0 4px" id="msgs-lista"></div></div>`;

  window.marcarLida=(id)=>{ const m=mensagens.find(x=>x.id===id); if(m)m.lido=true; saveMsgs(); };

    fab.onclick=()=>{
      const destOpts=`<option value="todos">Toda a equipe</option>`+
        EQUIPE_LOCAL.filter(e=>e.nome!==nome).map(e=>`<option value="${e.nome}">${e.nome.split(' ')[0]} — ${e.cargo}</option>`).join('');

        <h3>💬 Nova mensagem</h3>
