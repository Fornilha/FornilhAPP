<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FornilhApp</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --verm:#8B1A1A;--verm-d:#6B1212;--verm-m:#A02020;
  --ouro:#D4941A;--ouro-l:#F0B830;--ouro-p:#FDF3DC;
  --fogo:#E8650A;--tijolo:#A0431A;
  --bg:#F7F3EE;--surf:#FFFFFF;--surf2:#FDF8F2;
  --bord:rgba(139,26,26,0.12);--bord2:rgba(139,26,26,0.2);
  --txt:#1A0A0A;--txt2:#7A5A5A;--txt3:#B09090;
  --ok:#1D9E75;--ok-l:#E1F5EE;
  --av:#BA7517;--av-l:#FAEEDA;
  --er:#A32D2D;--er-l:#FCEBEB;
  --info:#185FA5;--info-l:#E6F1FB;
  --r:12px;--rl:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
.shell{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LOGIN */
#scr-login{background:linear-gradient(160deg,var(--verm-d) 0%,var(--verm) 50%,var(--tijolo) 100%);align-items:center;justify-content:center;padding:40px 24px}
.logo-mark{width:88px;height:88px;border-radius:22px;background:rgba(255,255,255,0.1);border:2px solid rgba(212,148,26,0.35);display:flex;align-items:center;justify-content:center;margin:0 auto 13px;font-size:36px}
.logo-nome{font-size:30px;font-weight:700;color:var(--ouro-l);font-style:italic;text-align:center}
.logo-sub{font-size:11px;color:rgba(255,255,255,0.45);text-align:center;margin-top:3px;letter-spacing:.07em;text-transform:uppercase;margin-bottom:26px}
.login-card{background:var(--surf);border-radius:var(--rl);padding:24px 20px;width:100%;box-shadow:0 8px 32px rgba(139,26,26,.18)}
.login-card h2{font-size:17px;font-weight:600;color:var(--verm);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--txt2);margin-bottom:18px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.fld input,.fld select{width:100%;padding:11px 13px;border:1.5px solid var(--bord);border-radius:10px;font-size:14px;color:var(--txt);background:var(--surf2);outline:none;transition:border-color .15s}
.fld input:focus,.fld select:focus{border-color:var(--ouro)}
.btn-p{width:100%;padding:13px;background:linear-gradient(135deg,var(--verm),var(--verm-m));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .15s}
.btn-p:hover{opacity:.92}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.login-ft{text-align:center;margin-top:14px;font-size:11px;color:rgba(255,255,255,.38)}
.login-err{background:var(--er-l);color:var(--er);border-radius:8px;padding:9px 12px;font-size:13px;margin-top:10px;display:none}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,var(--verm-d),var(--verm));padding:0 15px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(139,26,26,.3)}
.tb-l{display:flex;align-items:center;gap:9px}
.tb-logo{font-size:19px;font-weight:700;color:var(--ouro-l);font-style:italic}
.tb-pg{font-size:12px;color:rgba(255,255,255,.6)}
.tb-r{display:flex;align-items:center;gap:9px}
.ntf-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative}
.ntf-dot{position:absolute;top:5px;right:5px;width:8px;height:8px;background:var(--ouro-l);border-radius:50%;border:1.5px solid var(--verm)}
.av-sm{width:32px;height:32px;border-radius:50%;background:var(--ouro);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--verm-d);cursor:pointer;border:2px solid rgba(255,255,255,.25)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surf);border-top:1px solid var(--bord);display:flex;padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(139,26,26,.08)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 0;cursor:pointer;border:none;background:none;transition:all .15s}
.ni-ico{font-size:20px;line-height:1}
.ni-lbl{font-size:10px;font-weight:500;color:var(--txt3)}
.ni.active .ni-lbl{color:var(--verm);font-weight:700}
.ni.active .ni-ico{transform:scale(1.1)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:14px 14px 88px}

/* UTILS */
.card{background:var(--surf);border-radius:var(--r);border:1px solid var(--bord);margin-bottom:11px;overflow:hidden}
.cb{padding:13px 15px}
.slbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--txt2);margin-bottom:9px;padding-left:2px}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;flex-shrink:0}
.tag-r{background:var(--er-l);color:var(--er)} .tag-a{background:var(--av-l);color:var(--av)} .tag-g{background:var(--ok-l);color:var(--ok)} .tag-i{background:var(--info-l);color:var(--info)}

/* KPI */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
.kpi{background:var(--surf);border-radius:var(--r);border:1px solid var(--bord);padding:13px}
.kpi-l{font-size:11px;color:var(--txt2);font-weight:500;margin-bottom:3px}
.kpi-v{font-size:20px;font-weight:700;color:var(--txt);line-height:1}
.kpi-v.g{color:var(--ok)} .kpi-v.a{color:var(--ouro)} .kpi-v.r{color:var(--verm)}
.kpi-s{font-size:11px;color:var(--txt3);margin-top:2px}
.kpi.dest{background:linear-gradient(135deg,var(--verm-d),var(--verm));border:none}
.kpi.dest .kpi-l{color:rgba(255,255,255,.6)} .kpi.dest .kpi-v{color:var(--ouro-l)} .kpi.dest .kpi-s{color:rgba(255,255,255,.45)}

/* AI */
.ai-card{background:linear-gradient(135deg,var(--verm-d),#4A0808);border-radius:var(--r);padding:15px;margin-bottom:13px;border:1px solid rgba(212,148,26,.25)}
.ai-hd{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.ai-badge{background:var(--ouro);color:var(--verm-d);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.ai-title{font-size:13px;font-weight:600;color:var(--ouro-l)}
.ai-card p{font-size:13px;color:rgba(255,255,255,.82);line-height:1.6;min-height:40px}
.ai-inp{display:flex;gap:7px;margin-top:11px}
.ai-inp input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:13px;outline:none}
.ai-inp input::placeholder{color:rgba(255,255,255,.35)}
.ai-inp button{padding:9px 14px;background:var(--ouro);color:var(--verm-d);border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.ai-loading{display:none;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:rgba(255,255,255,.5)}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--ouro);animation:pulse .8s ease-in-out infinite}
.ai-dot:nth-child(2){animation-delay:.15s}.ai-dot:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* ALERT */
.alrt{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--bord)}
.alrt:last-child{border-bottom:none}
.alrt-ico{font-size:17px;flex-shrink:0}
.alrt-txt{font-size:13px;color:var(--txt);flex:1;line-height:1.4}

/* POST */
.post{background:var(--surf);border-radius:var(--r);border:1px solid var(--bord);margin-bottom:11px;overflow:hidden}
.ph{display:flex;align-items:center;gap:9px;padding:11px 13px 0}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.pa{font-size:13px;font-weight:600;color:var(--txt)} .pt{font-size:11px;color:var(--txt3)}
.ptb{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.pb{padding:9px 13px 13px;font-size:13px;color:var(--txt);line-height:1.6}
.phl{background:var(--ouro-p);border-radius:8px;padding:9px 11px;margin-top:7px;font-size:13px;border-left:3px solid var(--ouro)}
.pacts{display:flex;border-top:1px solid var(--bord)}
.pact{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;font-size:12px;color:var(--txt2);cursor:pointer;border:none;background:none;border-right:1px solid var(--bord)}
.pact:last-child{border-right:none}

/* TAREFA */
.tar{background:var(--surf);border-radius:var(--r);border:1px solid var(--bord);margin-bottom:9px;overflow:hidden}
.tar-h{display:flex;align-items:center;gap:9px;padding:11px 13px}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tar-i{flex:1;min-width:0}
.tar-t{font-size:14px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tar-m{font-size:11px;color:var(--txt2);margin-top:1px}
.sbadge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;flex-shrink:0}
.sp{background:var(--av-l);color:var(--av)} .sa{background:var(--info-l);color:var(--info)}
.sc{background:var(--ok-l);color:var(--ok)} .sat{background:var(--er-l);color:var(--er)} .sx{background:#f0f0f0;color:#999}
.tar-f{border-top:1px solid var(--bord);padding:9px 13px;display:flex;align-items:center;justify-content:space-between}
.tar-r{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2)}
.btn-tar{background:var(--verm);color:#fff;border:none;padding:6px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.fab{position:fixed;bottom:84px;right:calc(50% - 215px + 14px);width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--verm),var(--verm-m));color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(139,26,26,.4);display:flex;align-items:center;justify-content:center;z-index:50}

/* ESTOQUE / TABS */
.stabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:13px;padding-bottom:2px}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--bord);background:var(--surf);color:var(--txt2);cursor:pointer;transition:all .15s}
.stab.active{background:var(--verm);color:#fff;border-color:var(--verm)}
.prow{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--bord)}
.prow:last-child{border-bottom:none}
.pdotS{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pi{flex:1;min-width:0}
.pn{font-size:13px;font-weight:500;color:var(--txt)}
.pm2{font-size:11px;color:var(--txt2)}
.pbar{height:3px;background:#EEE;border-radius:2px;margin-top:3px;overflow:hidden;width:70px}
.pbf{height:100%;border-radius:2px}
.pq{font-size:15px;font-weight:700;text-align:right}
.pq.baixo{color:var(--ouro)} .pq.zero{color:var(--verm)}

/* VENDAS */
.mcard{background:linear-gradient(135deg,var(--verm-d),var(--verm));border-radius:var(--r);padding:17px;margin-bottom:13px}
.ml{font-size:12px;color:rgba(255,255,255,.6);font-weight:500;margin-bottom:3px}
.mv{font-size:26px;font-weight:700;color:var(--ouro-l)}
.ms{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
.mp{height:5px;background:rgba(255,255,255,.18);border-radius:3px;margin-top:13px;overflow:hidden}
.mpf{height:100%;background:var(--ouro-l);border-radius:3px}
.mes-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bord)}
.mes-row:last-child{border-bottom:none}
.mes-nome{font-size:13px;font-weight:600;color:var(--txt);width:40px}
.mes-bar-wrap{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.mes-bar{height:100%;border-radius:3px}
.mes-val{font-size:12px;font-weight:600;color:var(--txt);text-align:right;width:80px}
.mes-var{font-size:10px;width:44px;text-align:right;font-weight:600}
.rk{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--bord)}
.rk:last-child{border-bottom:none}
.rp{width:22px;height:22px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--txt2);flex-shrink:0}
.rp.g{background:var(--ouro-p);color:var(--ouro)}
.ri{flex:1} .rn{font-size:13px;font-weight:600;color:var(--txt)} .rv{font-size:12px;color:var(--txt2)}
.rval{font-size:14px;font-weight:700;color:var(--verm)}

/* MSGS */
.ci{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--bord);cursor:pointer}
.ci:last-child{border-bottom:none}
.cav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.cn{font-size:14px;font-weight:600;color:var(--txt)}
.cpv{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ct{font-size:11px;color:var(--txt3)} .cbadge{width:17px;height:17px;background:var(--verm);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}

/* NOTIF */
.ni2{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--bord)}
.ni2:last-child{border-bottom:none}
.ni2.unread{background:var(--ouro-p);margin:0 -14px;padding:11px 14px}
.ni-ic{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ni-txt{font-size:13px;color:var(--txt);line-height:1.5} .ni-tm{font-size:11px;color:var(--txt3);margin-top:2px}
.ni-ud{width:7px;height:7px;border-radius:50%;background:var(--verm);flex-shrink:0;margin-top:5px}

/* PERFIL */
.ph2{background:linear-gradient(160deg,var(--verm-d),var(--verm));padding:26px 18px 22px;text-align:center}
.av-lg{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--verm-d);margin:0 auto 11px;border:3px solid rgba(255,255,255,.25)}
.pnome{font-size:19px;font-weight:700;color:#fff} .pcargo{font-size:12px;color:var(--ouro-l);margin-top:2px}
.pstats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:13px}
.pst{background:var(--surf);padding:13px 7px;text-align:center}
.psv{font-size:18px;font-weight:700;color:var(--verm)} .psl{font-size:10px;color:var(--txt2);font-weight:500;margin-top:1px}
.mi{display:flex;align-items:center;gap:11px;padding:13px;border-bottom:1px solid var(--bord);cursor:pointer}
.mi:last-child{border-bottom:none}
.mi-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.mi-txt{flex:1;font-size:14px;font-weight:500;color:var(--txt)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--surf);border-radius:var(--rl);padding:22px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:4px}
.modal p{font-size:13px;color:var(--txt2);margin-bottom:14px;line-height:1.5}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;border:1px solid var(--bord);border-radius:8px;font-size:14px;margin-bottom:9px;color:var(--txt);background:var(--bg);outline:none;font-family:inherit}
.modal textarea{resize:none;height:75px}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--ouro)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mbtns{display:flex;gap:8px;margin-top:3px}
.btn-cancel{flex:1;padding:10px;border:1px solid var(--bord);background:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--txt)}
.btn-ok{flex:2;padding:10px;background:var(--verm);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-wpp{flex:2;padding:10px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--txt);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* INDICADOR BAR */
.ind-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bord)}
.ind-row:last-child{border-bottom:none}
.ind-lbl{font-size:12px;color:var(--txt2);width:130px;flex-shrink:0}
.ind-bar-w{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.ind-bar{height:100%;border-radius:3px}
.ind-val{font-size:12px;font-weight:700;width:48px;text-align:right;flex-shrink:0}

/* LOADING SCREEN */
#scr-loading{background:linear-gradient(160deg,var(--verm-d),var(--verm));align-items:center;justify-content:center}
.spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--ouro-l);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">

<!-- LOADING -->
<div class="screen active" id="scr-loading">
  <div style="text-align:center">
    <div class="spin"></div>
    <div style="color:var(--ouro-l);font-size:19px;font-weight:700;font-style:italic">Fornilha</div>
    <div style="color:rgba(255,255,255,.45);font-size:12px;margin-top:4px">Carregando...</div>
  </div>
</div>

<!-- LOGIN -->
<div class="screen" id="scr-login">
  <div class="logo-mark">🔥</div>
  <div class="logo-nome">Fornilha</div>
  <div class="logo-sub">Gestão interna · Ilha Grande/RJ</div>
  <div class="login-card">
    <h2 id="login-titulo">Bem-vindo de volta</h2>
    <p id="login-sub">Selecione seu usuário e digite sua senha.</p>
    <div class="fld" id="fld-usuario"><label>Usuário</label>
      <select id="l-codigo" autocomplete="username">
        <option value="">— Selecione seu usuário —</option>
        <option value="U1">Usuário 1 - Administrador</option>
        <option value="U2">Usuário 2 - Caixa</option>
        <option value="U3">Usuário 3 - Bar</option>
        <option value="U4">Usuário 4 - Vendedor</option>
        <option value="U5">Usuário 5 - Vendedor</option>
        <option value="U6">Usuário 6 - Vendedor</option>
        <option value="U7">Usuário 7 - Vendedor</option>
        <option value="U8">Usuário 8 - Pizzaria</option>
        <option value="U9">Usuário 9 - Pizzaria</option>
        <option value="U10">Usuário 10 - Pizzaria</option>
        <option value="U11">Usuário 11 - Cozinha</option>
        <option value="U12">Usuário 12 - Cozinha</option>
        <option value="U13">Usuário 13 - Cozinha</option>
        <option value="U14">Usuário 14 - Cozinha</option>

function checkLembretes(){
  const hoje=new Date();
  const diaS=hoje.getDay(); // 0=Dom
  const dataHoje=hoje.toISOString().slice(0,10);
  notifDisparadas=[];
  lembretes.forEach(l=>{
    if(!l.ativo)return;
    const jaDeu=l.ultimoDisparo===dataHoje;
    const deveDisparar=l.diasSemana.includes(diaS);
    if(deveDisparar&&!jaDeu){
      l.ultimoDisparo=dataHoje;
      notifDisparadas.push(l);
    }
  });
  if(notifDisparadas.length) saveLembretes();
  // atualiza badge
  const dot=document.querySelector('.ntf-dot');
  if(dot) dot.style.display=notifDisparadas.length>0?'block':'none';
}

// ─── AUTH ────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    // Verifica se perfil está completo antes de entrar no app
    const { data: prof } = await db.from('profiles').select('perfil,nome').eq('id', session.user.id).single();
    if (!prof || !prof.perfil || !prof.nome) {
      // Perfil incompleto — faz logout e pede novo login para completar identificação
      await db.auth.signOut();
      mostrarLogin();
      return;
    }
    userSession = session;
    await carregarPerfil(session.user.id, session.user.email);
    await mostrarApp();
  } else {
    mostrarLogin();
  }

  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      if (window._loginAtivo) return; // entrar() já está gerenciando
      // Restauração de sessão (refresh da página) — verifica perfil
      const { data: prof } = await db.from('profiles').select('perfil,nome').eq('id', session.user.id).single();
      if (!prof || !prof.perfil || !prof.nome) return; // sem perfil completo, ignora
      userSession = session;
      await carregarPerfil(session.user.id, session.user.email);
      await mostrarApp();
    } else if (event === 'SIGNED_OUT') {

async function carregarPerfil(userId, email) {
  const { data } = await db.from('profiles').select('*').eq('id', userId).single();
  if (data) {

    nome = data.nome || email.split('@')[0];
    perfil = data.perfil || (email === 'financeiro.fornilha@gmail.com' ? 'admin' : 'garcom');

    perfil = email === 'financeiro.fornilha@gmail.com' ? 'admin' : 'garcom';
  }
}

const SENHA_PADRAO = 'Fornilha2026@';

function codigoParaEmail(codigo) {
  if (codigo === 'U1') return 'financeiro.fornilha@gmail.com';
  const num = codigo.replace(/\D/g,'');
  return `u${num}@fornilha.app`;
}

async function entrar() {
  window._loginAtivo = true;
  const codigo = document.getElementById('l-codigo').value.trim().toUpperCase();
  const senha = document.getElementById('l-senha').value;
  const btn = document.getElementById('btn-entrar');
  if (!codigo) { window._loginAtivo=false; mostrarErroLogin('Selecione seu usuário.'); return; }
  if (!senha)  { window._loginAtivo=false; mostrarErroLogin('Digite sua senha.'); return; }
  const email = codigoParaEmail(codigo);
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  const { data, error } = await db.auth.signInWithPassword({ email, password: senha });
  if (error) {
    mostrarErroLogin('Usuário ou senha incorretos.');
    btn.disabled = false;
    btn.textContent = 'Entrar no FornilhApp';
    window._loginAtivo = false;
    return;
  }
  // Verifica se perfil está completo no banco
  const { data: prof } = await db.from('profiles').select('perfil,nome').eq('id', data.user.id).single();
  const primeiroAcesso = !prof || !prof.perfil || !prof.nome;
  if (primeiroAcesso) {
    document.getElementById('login-titulo').textContent = 'Bem-vindo!';
    document.getElementById('login-sub').textContent = 'Identifique-se na equipe e crie sua senha pessoal.';
    document.getElementById('l-senha').closest('.fld').style.display = 'none';
    document.getElementById('fld-apelido').style.display = 'block';
    document.getElementById('fld-nova-senha').style.display = 'block';
    document.getElementById('fld-conf-senha').style.display = 'block';
    document.getElementById('btn-entrar').style.display = 'none';
    document.getElementById('btn-criar-senha').style.display = 'block';
    document.getElementById('fld-usuario').style.display = 'none';
    document.getElementById('login-err').style.display = 'none';
    window._sessaoTemp = data.session;
    window._codigoLogin = codigo;
    const sel = document.getElementById('l-apelido');
    sel.innerHTML = '<option value="">— Selecione —</option>' +
      EQUIPE_LOCAL.map(e=>`<option value="${e.nome}">${e.nome.split(' ')[0]} — ${e.cargo}</option>`).join('');
    btn.disabled = false;
    btn.textContent = 'Entrar no FornilhApp';
    // _loginAtivo fica true até criarSenha() concluir
    return;
  }
  // Perfil completo — entra
  userSession = data.session;
  await carregarPerfil(data.user.id, data.user.email);
  window._loginAtivo = false;
  await mostrarApp();
}

async function criarSenha() {
  const colaboradorNome = document.getElementById('l-apelido').value;
  const nova = document.getElementById('l-nova-senha').value;
  const conf = document.getElementById('l-conf-senha').value;
  if (!colaboradorNome) { mostrarErroLogin('Selecione quem você é na equipe.'); return; }
  if (!nova || nova.length < 6) { mostrarErroLogin('A senha precisa ter pelo menos 6 caracteres.'); return; }
  if (nova !== conf) { mostrarErroLogin('As senhas não coincidem.'); return; }
  if (nova === SENHA_PADRAO) { mostrarErroLogin('Escolha uma senha diferente da padrão.'); return; }
  const btn = document.getElementById('btn-criar-senha');
  btn.disabled = true;
  btn.textContent = 'Salvando...';
  const colab = EQUIPE_LOCAL.find(e => e.nome === colaboradorNome);
  const { error } = await db.auth.updateUser({ password: nova, data: { nome: colaboradorNome } });
  if (error) {
    mostrarErroLogin('Erro: ' + (error.message || 'Tente novamente.'));
    btn.disabled = false;
    btn.textContent = 'Salvar e entrar';
    return;
  }
  const { data: { session } } = await db.auth.getSession();
  const nomeReal = colab?.nome || colaboradorNome;
  const perfilReal = colab?.perfil || 'garcom';
  const { error: upsertError } = await db.from('profiles').upsert({
    id: session.user.id,
    nome: nomeReal,
    cargo: colab?.cargo || '',
    perfil: perfilReal,
    telefone: colab?.tel || '',
    apelido: colaboradorNome.split(' ')[0],
    user_code: window._codigoLogin || ''
  }, { onConflict: 'id' });
  if (upsertError) {
    mostrarErroLogin('Erro ao salvar perfil: ' + (upsertError.message || 'Tente novamente.'));
    btn.disabled = false; btn.textContent = 'Salvar e entrar';
    window._loginAtivo = false; return;
  }
  nome = nomeReal;
  perfil = perfilReal;
  userProfile = { nome: nomeReal, perfil: perfilReal, cargo: colab?.cargo || '', apelido: colaboradorNome.split(' ')[0] };
  window._loginAtivo = false;
  userSession = session;
  await mostrarApp();
  showT('✅ Bem-vindo, ' + colaboradorNome.split(' ')[0] + '!');
}

async function loadTarefas() {
  const { data, error } = await db.from('tarefas').select('*').order('created_at', { ascending: false });
  if (error) { showT('⚠️ Erro ao carregar tarefas: ' + error.message); return; }
  if (data) tarefas = data.map(t => ({...t, dados: t.dados || {}}));
}
async function saveTarefa(t) {
  const { data, error } = await db.from('tarefas').insert({
    tipo: t.tipo, titulo: t.titulo, setor: t.setor,
    resp: t.resp, tel: t.tel, prazo: t.prazo,
    status: t.status, dados: t.dados
  }).select().single();
  if (error) { showT('⚠️ Erro ao salvar tarefa: ' + error.message); return; }
  if (data) t.id = data.id;
}
async function updateTarefa(id, changes) {
  const { error } = await db.from('tarefas').update(changes).eq('id', id);
  if (error) showT('⚠️ Erro ao atualizar tarefa: ' + error.message);
}

function aplicarEstoqueDosTasks() {
  // Para cada setor, pega a tarefa de estoque concluída mais recente e aplica as quantidades
  Object.keys(ESTOQUE).forEach(setor => {
    const concluidas = tarefas
      .filter(t => t.tipo === 'estoque' && t.setor === setor && t.status === 'concluida')
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    if (!concluidas.length) return;
    const dados = concluidas[0].dados || {};
    ESTOQUE[setor].forEach(it => {
      if (dados[it.n] !== undefined) it.q = dados[it.n];
    });
  });
}

async function mostrarApp() {
  await loadTarefas();
  aplicarEstoqueDosTasks();
  document.getElementById('scr-loading').classList.remove('active');
  document.getElementById('scr-login').classList.remove('active');

  window.concluirTarefa=(id)=>{

    const dados={};
    if(t.tipo==='caixa'){
      dados.data=document.getElementById('cf-data').value||new Date().toISOString().slice(0,10);
      dados.fat=parseFloat(document.getElementById('cf-fat').value)||0;
      dados.taxa=parseFloat(document.getElementById('cf-taxa').value)||0;
      dados.balcao=parseFloat(document.getElementById('cf-balcao').value)||0;
      dados.mesas=parseInt(document.getElementById('cf-mesas').value)||0;
      dados.tm=parseFloat(document.getElementById('cf-tm').value)||0;
      if(!dados.tm && dados.mesas>0) dados.tm=parseFloat((dados.fat/dados.mesas).toFixed(2));
      GARCONS.forEach(g=>{ dados['v_'+g.nome]=parseFloat(document.getElementById('vend_'+g.nome.replace(/\s/g,'_'))?.value)||0; });
    } else if(t.tipo==='producao'){
      if(t.setor==='Cozinha'){

          sabs.forEach(s=>{ dados[massa+'_'+s]=parseInt(document.getElementById('prod_'+massa+'_'+s.replace(/\s/g,'_'))?.value)||0; });
        });
      } else {
        PRODUCAO_PIZZARIA.forEach(it=>{ dados[it.n]=parseFloat(document.getElementById('prod_'+it.n.replace(/\s/g,'_'))?.value)||0; });
      }
    } else if(t.tipo==='estoque'){
      (ESTOQUE[t.setor]||[]).forEach(it=>{
        const v=parseFloat(document.getElementById('est_'+it.n.replace(/[\s\/]/g,'_'))?.value);
        dados[it.n]=isNaN(v)?it.q:v;
        it.q=dados[it.n];
      });

      dados.obs=document.getElementById('outro-obs')?.value||'';

    t.status='concluida';

      txt:`${tp.icon} <strong>${t.titulo}</strong> concluída por ${t.resp}.`,
      mediaUrl:'',mediaName:'',extra:'',time:'Agora'});
    fecharModal(); rList(); showT('Enviado com sucesso!');
  };

  rList();

    const fab=document.createElement('button');
    fab.className='fab';fab.textContent='+';fab.onclick=abrirNovaTarefa;
    document.querySelector('.shell').appendChild(fab);
  }
},
estoque(a) {
  let sel='Pizzaria';
  function fmtDate(iso){
    if(!iso)return null;
    const d=new Date(iso);
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+'  '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  function rEst(){
    const prods=ESTOQUE[sel];
    const lastDates=[...new Set(prods.filter(p=>p.last_count).map(p=>p.last_count))].sort().reverse();
    const lastCount=lastDates.length?fmtDate(lastDates[0]):null;
    document.getElementById('est-last').textContent=lastCount?`Última contagem: ${lastCount}`:'Nenhuma contagem realizada ainda';

    document.getElementById('est-lista').innerHTML=prods.map(p=>{
      const cor=p.q===0?'#E24B4A':p.q<=p.min?'#EF9F27':'#1D9E75';
      const pct=Math.min(100,Math.round(p.q/p.max*100));
      let deltaHtml='';
      if(p.prev_q!==null && p.prev_q!==undefined){
        const diff=p.q-p.prev_q;
        if(diff!==0){
          const dCor=diff>0?'#1D9E75':'#E24B4A';
          const dIcon=diff>0?'↑':'↓';
          deltaHtml=`<span style="font-size:11px;font-weight:700;color:${dCor};background:${dCor}18;border-radius:6px;padding:1px 5px;margin-left:5px">${diff>0?'+':''}${diff} ${dIcon}</span>`;
        }
      }
      return `<div class="prow" style="padding:10px 4px;align-items:center">
        <div class="pdotS" style="background:${cor};flex-shrink:0"></div>
        <div class="pi" style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">
            <span class="pn">${p.n}</span>${deltaHtml}
          </div>
          <div class="pm2" style="margin:2px 0 4px">Mín: ${p.min} · Máx: ${p.max} ${p.un}</div>
          <div class="pbar"><div class="pbf" style="width:${pct}%;background:${cor}"></div></div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:10px">
          <div class="pq${p.q===0?' zero':p.q<=p.min?' baixo':''}" style="font-size:20px">${p.q}</div>
          <div style="font-size:10px;color:var(--txt3)">${p.un}</div>
        </div>
      </div>`;
    }).join('');

    const zero=prods.filter(p=>p.q===0).length;
    const baixo=prods.filter(p=>p.q>0&&p.q<=p.min).length;
    const ok=prods.filter(p=>p.q>p.min).length;
    const semCount=prods.filter(p=>p.last_count===null||p.last_count===undefined).length;
    document.getElementById('est-resumo').innerHTML=
      `<span style="color:#1D9E75">✅ ${ok} ok</span>&nbsp;&nbsp;`+
      (baixo?`<span style="color:#EF9F27">🟡 ${baixo} baixo</span>&nbsp;&nbsp;`:'')+
      (zero?`<span style="color:#E24B4A">🔴 ${zero} zerado</span>&nbsp;&nbsp;`:'')+
      (semCount?`<span style="color:var(--txt3)">📋 ${semCount} sem contagem</span>`:'');
  }
  a.innerHTML=`
  <div class="stabs">${Object.keys(ESTOQUE).map(s=>`<button class="stab${s===sel?' active':''}" onclick="selSet('${s}',this)">${s}</button>`).join('')}</div>
  <div style="font-size:11px;color:var(--txt3);padding:0 2px 4px" id="est-last"></div>
  <div style="font-size:12px;font-weight:600;padding:0 2px 10px" id="est-resumo"></div>
  <div class="card"><div class="cb" id="est-lista"></div></div>
  <button class="btn-p" style="background:linear-gradient(135deg,#25D366,#1aad53);margin-top:8px" onclick="envWpp()">📱 Enviar resumo por WhatsApp</button>`;
  window.selSet=(s,el)=>{sel=s;document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));el.classList.add('active');rEst()};
  window.envWpp=()=>{
    const p=ESTOQUE[sel],zero=p.filter(x=>x.q===0).map(x=>x.n),baixo=p.filter(x=>x.q>0&&x.q<=x.min).map(x=>x.n);
    let msg=`📦 *ESTOQUE ${sel.toUpperCase()} — FORNILHA*\n📅 ${new Date().toLocaleDateString('pt-BR')}\n\n✅ OK: ${p.filter(x=>x.q>x.min).length}\n🟡 Baixo: ${baixo.length}\n🔴 Zero: ${zero.length}`;
    if(zero.length) msg+=`\n\n🔴 SEM ESTOQUE:\n${zero.map(i=>'• '+i).join('\n')}`;
    if(baixo.length) msg+=`\n\n🟡 ESTOQUE BAIXO:\n${baixo.map(i=>'• '+i).join('\n')}`;
    msg+=`\n\n_FornilhApp · ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}_`;
    window.open(`https://wa.me/5521991409144?text=${encodeURIComponent(msg)}`,'_blank');
  };
  rEst();
},

vendas(a) {

  const anoAtual=hoje.getFullYear();

  const caixaMes=tarefas.filter(t=>{
    if(t.tipo!=='caixa'||t.status!=='concluida')return false;
    const d=new Date((t.prazo||'')+'T12:00:00');
    return d.getMonth()===mesIdx&&d.getFullYear()===anoAtual;
  });
  const dias=caixaMes.length;
  const semDados=dias===0;
  const diasNoMes=new Date(anoAtual,mesIdx+1,0).getDate();

  // Acumulados
  const acumMesTasks=caixaMes.reduce((s,t)=>s+(t.dados?.fat||0),0);
  const dadosMes=DADOS_2026[mesIdx];
  const acumMes=acumMesTasks>0?acumMesTasks:(dadosMes?.fat||0);
  const acumAno=DADOS_2026.slice(0,mesIdx).reduce((s,d)=>s+d.fat,0)+acumMes;

  // Taxas por quinzena (usa tarefas de caixa se existirem, senão histórico do DADOS_2026)
  const taxaQ1Tasks=caixaMes.filter(t=>new Date((t.prazo||'')+'T12:00:00').getDate()<=15).reduce((s,t)=>s+(t.dados?.taxa||0),0);
  const taxaQ2Tasks=caixaMes.filter(t=>new Date((t.prazo||'')+'T12:00:00').getDate()>15).reduce((s,t)=>s+(t.dados?.taxa||0),0);
  const semTaxaTasks=taxaQ1Tasks===0&&taxaQ2Tasks===0;
  const taxaQ1=(semTaxaTasks?(dadosMes?.taxa_q1||0):taxaQ1Tasks)*0.75;
  const taxaQ2=(semTaxaTasks?(dadosMes?.taxa_q2||0):taxaQ2Tasks)*0.75;
  const taxaTotal=taxaQ1+taxaQ2;

  // Taxa acumulada no ano: meses anteriores (histórico bruto ×0.75) + mês vigente
  const taxaAcumAno=DADOS_2026.slice(0,mesIdx).reduce((s,d)=>s+((d.taxa_q1||0)+(d.taxa_q2||0)),0)*0.75+taxaTotal;

  // Vendas por vendedor (usa histórico quando sem tarefas de caixa)

    nome:g.nome.split(' ')[0],
    total:semDados?(vh[g.nome.split(' ')[0].toLowerCase()]||0):caixaMes.reduce((s,t)=>s+(t.dados?.['v_'+g.nome]||0),0)
  }));
  const totalPatricia=semDados?(vh.patricia||0):caixaMes.reduce((s,t)=>s+(t.dados?.['v_Patricia Jesus']||0),0);
  const somaVendedores=vendsGarcon.reduce((s,v)=>s+v.total,0)+totalPatricia;
  const totalBalcao=semDados?Math.max(0,acumMes-somaVendedores):caixaMes.reduce((s,t)=>s+(t.dados?.balcao||0),0);
  const totalVendedores=somaVendedores+totalBalcao;

  // Mesas e TM
  const totalMesas=caixaMes.reduce((s,t)=>s+(t.dados?.mesas||0),0);
  const tmMedio=totalMesas>0?acumMesTasks/totalMesas:0;

  const aviso=semDados?`<div style="font-size:12px;color:var(--txt3);text-align:center;padding:18px 0">Nenhuma Conferência de Caixa lançada em ${mesNome} ainda.<br>Os dados aparecerão aqui conforme as tarefas forem concluídas.</div>`:'';

  // Histórico mensal
  const dadosValidos=DADOS_2026.filter(d=>d.fat>0);
  const maxFat=Math.max(...dadosValidos.map(d=>d.fat));

  <div class="slbl">Taxa de serviço (equipe 75%) — ${mesNome}</div>
  <div class="card" style="margin-bottom:12px"><div class="cb">
    ${semDados?`<div style="font-size:11px;color:var(--txt3);padding:6px 0 10px">Dados históricos — Conferência de Caixa ainda não lançada em ${mesNome}</div>`:''}

  <div class="slbl">Vendas por vendedor — ${mesNome}</div>

msgs(a) {
  const DIAS_PT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  function fmtMsgTime(iso){
    if(!iso)return'';
    const d=new Date(iso),hoje=new Date();
    const isHoje=d.toDateString()===hoje.toDateString();
    return isHoje?d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  }
  function rMsgs(){
    const visíveis=perfil==='admin'?mensagens:mensagens.filter(m=>m.para==='todos'||m.para===nome);
    if(!visíveis.length){
      a.querySelector('#msgs-lista').innerHTML=`<div style="text-align:center;color:var(--txt3);padding:32px 0;font-size:13px">Nenhuma mensagem ainda.</div>`;
      return;
    }
    a.querySelector('#msgs-lista').innerHTML=visíveis.slice().reverse().map(m=>{
      const minha=m.de===nome;
      const ini=m.de.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
      const cor=EQUIPE_LOCAL.find(e=>e.nome===m.de)?.cor||'#888';
      const naoLida=!m.lido&&m.para!=='todos'&&m.para===nome;
      return`<div style="display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--bord);align-items:flex-start${naoLida?';background:var(--surf);border-radius:10px;padding:10px':''}" onclick="marcarLida('${m.id}')">
        <div style="width:38px;height:38px;border-radius:50%;background:${cor};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0">${ini}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
            <span style="font-size:12px;font-weight:700">${m.de.split(' ')[0]}</span>
            <span style="font-size:10px;color:var(--txt3)">${fmtMsgTime(m.time)}</span>
          </div>
          <div style="font-size:11px;color:var(--txt3);margin-bottom:4px">Para: <strong>${m.para==='todos'?'Toda a equipe':m.para.split(' ')[0]}</strong></div>
          <div style="font-size:13px;color:var(--txt);line-height:1.4">${m.texto}</div>
        </div>
        ${naoLida?`<div style="width:8px;height:8px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:6px"></div>`:''}
      </div>`;
    }).join('');
  }
  a.innerHTML=`
    <div class="card"><div class="cb" style="padding:0 4px" id="msgs-lista"></div></div>`;
  rMsgs();
  window.marcarLida=(id)=>{ const m=mensagens.find(x=>x.id===id); if(m)m.lido=true; saveMsgs(); };
  if(perfil==='admin'){
    const fab=document.createElement('button');
    fab.className='fab';fab.textContent='+';
    fab.onclick=()=>{
      const destOpts=`<option value="todos">Toda a equipe</option>`+
        EQUIPE_LOCAL.filter(e=>e.nome!==nome).map(e=>`<option value="${e.nome}">${e.nome.split(' ')[0]} — ${e.cargo}</option>`).join('');
      document.getElementById('modal-inner').innerHTML=`
        <h3>💬 Nova mensagem</h3>
        <div class="fld"><label>Para</label><select id="msg-para">${destOpts}</select></div>
        <div class="fld"><label>Mensagem</label><textarea id="msg-txt" rows="4" placeholder="Digite sua mensagem…" style="width:100%;padding:10px;border:1px solid var(--bord);border-radius:8px;background:var(--surf);color:var(--txt);font-size:14px;resize:vertical"></textarea></div>
        <div class="mbtns">
          <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
          <button class="btn-ok" onclick="enviarMsg()">Enviar</button>
        </div>`;
      document.getElementById('modal-bg').classList.add('open');
    };
    document.querySelector('.shell').appendChild(fab);
  }
  window.enviarMsg=()=>{
    const para=document.getElementById('msg-para').value;
    const txt=document.getElementById('msg-txt').value.trim();
    if(!txt){showT('Digite a mensagem');return;}
    mensagens.push({id:'msg_'+Date.now(),de:nome,para,texto:txt,time:new Date().toISOString(),lido:false});
    saveMsgs();fecharModal();rMsgs();showT('✅ Mensagem enviada!');
  };
},

notif(a) {
  const DIAS_PT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const DIAS_CORES=['#EF9F27','#185FA5','#185FA5','#185FA5','#185FA5','#185FA5','#1D9E75'];

  // Alertas automáticos do sistema
  const ref=DADOS_2026.filter(d=>d.fat>0).slice(-1)[0];
  const alertas=[];
  if(ref){
    if(ref.folha_pct>19) alertas.push({ic:'🔴',bg:'#FCEBEB',txt:`Folha ${ref.mes}: ${ref.folha_pct}% — acima do limite crítico de 19%. Avalie a equipe.`});
    if(ref.cmv_pct>32)   alertas.push({ic:'🔴',bg:'#FCEBEB',txt:`CMV ${ref.mes}: ${ref.cmv_pct}% — acima do limite de 32%. Revise compras.`});
    if(ref.margem<15)    alertas.push({ic:'🟡',bg:'#FDF3DC',txt:`Margem ${ref.mes}: ${ref.margem.toFixed(1)}% — abaixo da meta de 15%.`});
    if(alertas.length===0) alertas.push({ic:'✅',bg:'#EAF7F0',txt:`Indicadores de ${ref.mes} dentro das metas.`});
  }

  function rNotif(){
    const dispHtml=notifDisparadas.length?`
      <div class="slbl">Lembretes de hoje</div>
      <div class="card" style="margin-bottom:12px"><div class="cb" style="padding:0">
        ${notifDisparadas.map(l=>`<div class="ni2 unread">
          <div class="ni-ic" style="background:#E8F4FF">⏰</div>
          <div style="flex:1"><div class="ni-txt">${l.titulo}</div><div class="ni-tm">${l.texto||''}</div></div>
        </div>`).join('')}
      </div></div>`:'';

    const lembretesHtml=perfil==='admin'?`
      <div style="display:flex;align-items:center;justify-content:space-between;margin:14px 0 6px">
        <div class="slbl" style="margin:0">Lembretes agendados</div>
        <button style="font-size:12px;padding:4px 12px;border:1px solid var(--acc);color:var(--acc);background:transparent;border-radius:20px;cursor:pointer" onclick="criarLembrete()">+ Novo</button>
      </div>
      <div id="lembretes-lista"></div>`:'';

    a.innerHTML=`
      <div class="slbl">Alertas do sistema</div>
      <div class="card" style="margin-bottom:12px"><div class="cb" style="padding:0">
        ${alertas.map(n=>`<div class="ni2">
          <div class="ni-ic" style="background:${n.bg}">${n.ic}</div>
          <div style="flex:1"><div class="ni-txt">${n.txt}</div></div>
        </div>`).join('')}
      </div></div>
      ${dispHtml}
      ${lembretesHtml}`;

    if(perfil==='admin') renderLembretes();
  }

  function renderLembretes(){
    const el=document.getElementById('lembretes-lista');
    if(!el)return;
    if(!lembretes.length){
      el.innerHTML=`<div style="text-align:center;color:var(--txt3);padding:20px 0;font-size:13px">Nenhum lembrete agendado.</div>`;
      return;
    }
    el.innerHTML=lembretes.map(l=>`
      <div style="background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:14px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div>
            <div style="font-size:14px;font-weight:700">⏰ ${l.titulo}</div>
            ${l.texto?`<div style="font-size:12px;color:var(--txt3);margin-top:2px">${l.texto}</div>`:''}
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;margin-left:8px">
            <button style="font-size:11px;padding:3px 8px;border:1px solid ${l.ativo?'var(--ok)':'var(--bord)'};color:${l.ativo?'var(--ok)':'var(--txt3)'};background:transparent;border-radius:12px;cursor:pointer" onclick="toggleLembrete('${l.id}')">${l.ativo?'Ativo':'Pausado'}</button>
            <button style="font-size:11px;padding:3px 8px;border:1px solid var(--er);color:var(--er);background:transparent;border-radius:12px;cursor:pointer" onclick="deleteLembrete('${l.id}')">Excluir</button>
          </div>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${DIAS_PT.map((d,i)=>l.diasSemana.includes(i)?`<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:${DIAS_CORES[i]}22;color:${DIAS_CORES[i]};border:1px solid ${DIAS_CORES[i]}44">${d}</span>`:'').filter(Boolean).join('')}
        </div>
        ${l.ultimoDisparo?`<div style="font-size:10px;color:var(--txt3);margin-top:6px">Último disparo: ${new Date(l.ultimoDisparo).toLocaleDateString('pt-BR')}</div>`:''}
      </div>`).join('');
  }

  window.criarLembrete=()=>{
    document.getElementById('modal-inner').innerHTML=`
      <h3>⏰ Novo lembrete</h3>
      <div class="fld"><label>Título</label><input type="text" id="lem-titulo" placeholder="Ex: Contagem de estoque"></div>
      <div class="fld"><label>Descrição (opcional)</label><input type="text" id="lem-texto" placeholder="Ex: Solicitar contagem nos setores"></div>
      <div class="fld"><label>Dias da semana</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
          ${DIAS_PT.map((d,i)=>`<label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
            <input type="checkbox" value="${i}" class="lem-dia" style="accent-color:var(--acc)"> ${d}
          </label>`).join('')}
        </div>
      </div>
      <div class="mbtns">
        <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
        <button class="btn-ok" onclick="salvarLembrete()">Salvar</button>
      </div>`;
    document.getElementById('modal-bg').classList.add('open');
  };

  window.salvarLembrete=()=>{
    const titulo=document.getElementById('lem-titulo').value.trim();
    const texto=document.getElementById('lem-texto').value.trim();
    const dias=[...document.querySelectorAll('.lem-dia:checked')].map(c=>parseInt(c.value));
    if(!titulo){showT('Informe o título');return;}
    if(!dias.length){showT('Selecione ao menos um dia');return;}
    lembretes.push({id:'lem_'+Date.now(),titulo,texto,diasSemana:dias,ativo:true,ultimoDisparo:null});
    saveLembretes();fecharModal();renderLembretes();showT('✅ Lembrete criado!');
  };

  window.toggleLembrete=(id)=>{
    const l=lembretes.find(x=>x.id===id);
    if(l){l.ativo=!l.ativo;saveLembretes();renderLembretes();}
  };

  window.deleteLembrete=(id)=>{
    lembretes=lembretes.filter(x=>x.id!==id);
    saveLembretes();renderLembretes();
  };

  rNotif();
},

  window.salvarVinculo = async (num) => {
    const nome_v = document.getElementById('v-nome').value.trim();

    const resetar = document.getElementById('v-resetar').value;
    if (!nome_v) { showT('⚠️ Informe o nome'); return; }
    if (!window._vinculados) window._vinculados = {};
    window._vinculados[num] = { nome: nome_v, tel };
    // Atualiza nome no banco
    if (num === 1) {
      await db.from('profiles').update({ nome: nome_v, telefone: tel }).eq('id', userSession.user.id);

    fecharModal();
    document.getElementById('lista-usuarios').innerHTML = renderUsuarios();
    if (resetar === 'sim') {
      showT(`✅ Usuário ${num} vinculado — senha redefinida para padrão`);
    } else {
      showT(`✅ Usuário ${num} vinculado a ${nome_v.split(' ')[0]}!`);
    }
  };
},

async financeiro(a) {

  await loadPagamentos();

  const MESES_PT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const TIPOS_PAG = ['Boleto','PIX','Salário','Extra','Venda Folga','Rescisão','Reembolso','Folha de Pagamento','Outro'];
  const DEST_FLAVIANE = 'financeirorestaurantelonier@gmail.com';
  const DEST_CONTAB = 'workingfiscal10@outlook.com,lu_apessoa@yahoo.com.br,danimaronhas@terra.com.br';
  const MESES_NOME = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  function numExtenso(n) {
    const ex = {1:'UM',2:'DOIS',3:'TRÊS',4:'QUATRO',5:'CINCO',6:'SEIS',7:'SETE',8:'OITO',9:'NOVE',10:'DEZ'};
    return ex[n] || String(n);
  }
  function numExtensoF(n) { // feminino para faltas
    const ex = {1:'UMA',2:'DUAS',3:'TRÊS',4:'QUATRO',5:'CINCO',6:'SEIS',7:'SETE',8:'OITO',9:'NOVE',10:'DEZ'};
    return ex[n] || String(n);
  }
  function faltasTxt(n) {
    n = parseInt(n)||0;
    if (!n) return 'NÃO TEVE FALTAS';
    return `TEVE ${n} (${numExtensoF(n)}) FALTA${n>1?'S':''}`;
  }
  const hoje = new Date();
  const mesAtual = MESES_PT[hoje.getMonth()].toUpperCase() + '/' + String(hoje.getFullYear()).slice(2);
  const hojeISO = hoje.toISOString().slice(0,10);

  function fmtDataBr(iso) {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }
  function fmtVal(v) {
    return 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
  // distribui total em n parcelas com arredondamento na primeira
  function distribuirParcelas(total, n) {
    const base = Math.floor(total * 100 / n) / 100;
    const resto = Math.round((total - base * n) * 100) / 100;
    return Array.from({length:n}, (_,i) => parseFloat((i===0 ? base+resto : base).toFixed(2)));
  }

  function renderHistorico() {
    if (!pagamentos.length) return '<div style="padding:24px;text-align:center;color:var(--txt2)">Nenhum pagamento registrado ainda.</div>';
    return pagamentos.map(p => {
      const tipoCor = {Boleto:'#185FA5',PIX:'#1D9E75',Salário:'#8B1A1A',Extra:'#BA7517','Venda Folga':'#0F6E56',Rescisão:'#993C1D',Reembolso:'#3C3489',Outro:'#555'};
      const cor = tipoCor[p.tipo] || '#555';
      const dt = p.vencimento ? fmtDataBr(p.vencimento) : '—';
      const parcInfo = p.parcelas > 1 ? ` · ${p.parcelas}x` : '';
      return `<div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--bord)">
        <div style="width:40px;height:40px;border-radius:10px;background:${cor}22;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">
          ${p.tipo==='Boleto'?'📄':p.tipo==='PIX'?'💸':p.tipo==='Salário'?'👥':p.tipo==='Extra'?'💵':p.tipo==='Venda Folga'?'🏖️':p.tipo==='Rescisão'?'📝':'💰'}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--txt)">${p.item||p.fornecedor||'—'}</div>
          <div style="font-size:11px;color:var(--txt2)">${p.tipo}${parcInfo} · ${p.fornecedor||''} · 1º venc. ${dt}</div>
        </div>
        <div style="font-size:13px;font-weight:700;color:${cor};white-space:nowrap">${fmtVal(p.valor)}</div>
      </div>`;
    }).join('');
  }

  a.innerHTML = `

  };

  function renderFuncCard(i) {
    return `<div id="fin-func-${i}" style="background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;margin-bottom:8px">

        ${i>0?`<button onclick="window._finRemoveFunc(${i})" style="background:none;border:none;color:var(--verm);cursor:pointer;font-size:13px">✕ Remover</button>`:''}
      </div>

        <div class="fld" style="margin:0"><label style="font-size:11px">Cargo</label><input id="ff-cargo-${i}" placeholder="Ex: Cozinheiro"></div>
      </div>
      <div class="row2" style="margin-top:6px">
        <div class="fld" style="margin:0"><label style="font-size:11px">Salário base (R$)</label><input type="number" id="ff-sal-${i}" placeholder="0,00" step="0.01" min="0"></div>
        <div class="fld" style="margin:0"><label style="font-size:11px">Data de início</label><input type="date" id="ff-ini-${i}"></div>

      <div class="row2" style="margin-top:6px">
        <div class="fld" style="margin:0"><label style="font-size:11px">Último dia</label><input type="date" id="ff-fim-${i}"></div>
        <div class="fld" style="margin:0"><label style="font-size:11px">Dias trabalhados</label><input type="number" id="ff-dias-${i}" placeholder="0" min="0"></div>
      </div>
      <div class="row2" style="margin-top:6px">
        <div class="fld" style="margin:0"><label style="font-size:11px">Horas c/ adic. noturno</label><input id="ff-hnoturno-${i}" placeholder="00:00"></div>
        <div class="fld" style="margin:0"><label style="font-size:11px">Hora extra</label><input id="ff-hextra-${i}" placeholder="00:00"></div>
      </div>
      <div class="row2" style="margin-top:6px">
        <div class="fld" style="margin:0"><label style="font-size:11px">Feriados a compensar</label><input type="number" id="ff-feriado-${i}" placeholder="0" min="0" value="0"></div>
        <div class="fld" style="margin:0"><label style="font-size:11px">Domingos a compensar</label><input type="number" id="ff-domingo-${i}" placeholder="0" min="0" value="0"></div>
      </div>
      <div class="fld" style="margin-top:6px"><label style="font-size:11px">Faltas no mês</label><input type="number" id="ff-faltas-${i}" placeholder="0" min="0" value="0"></div>

  window._finAtualizaFolha = () => {
    const n = window._folhaCount || 1;
    const subtipo = document.getElementById('fin-subtipo')?.value || 'FUNC. REGISTRADOS';

    if (!wrap) return;
    wrap.innerHTML = Array.from({length:n}, (_,i) => renderFuncCard(i)).join('');

    if (btnAdd) btnAdd.style.display = subtipo === 'FUNC. REGISTRADOS' ? '' : 'none';

  window._finAdicionaFunc = () => {
    window._folhaCount = (window._folhaCount||1) + 1;
    window._finAtualizaFolha();
  };

  window._finRemoveFunc = (idx) => {
    // Collect current values, remove idx, rebuild
    const n = window._folhaCount || 1;
    const dados = [];
    for (let i=0; i<n; i++) {
      if (i === idx) continue;
      dados.push({
        nome: document.getElementById('ff-nome-'+i)?.value||'',
        cargo: document.getElementById('ff-cargo-'+i)?.value||'',

        hnoturno: document.getElementById('ff-hnoturno-'+i)?.value||'',
        hextra: document.getElementById('ff-hextra-'+i)?.value||'',
        feriado: document.getElementById('ff-feriado-'+i)?.value||'0',
        domingo: document.getElementById('ff-domingo-'+i)?.value||'0',
        faltas: document.getElementById('ff-faltas-'+i)?.value||'0',
      });
    }
    window._folhaCount = Math.max(1, n-1);
    window._finAtualizaFolha();
    dados.forEach((d,i) => {
      ['nome','cargo','sal','ini','fim','dias','hnoturno','hextra','feriado','domingo','faltas'].forEach(k => {
        const el = document.getElementById(`ff-${k}-${i}`);
        if (el) el.value = d[k];

    });
  };

  function getFuncDados(i) {
    return {
      nome:    document.getElementById('ff-nome-'+i)?.value||'',
      cargo:   document.getElementById('ff-cargo-'+i)?.value||'',
      sal:     parseFloat(document.getElementById('ff-sal-'+i)?.value||0),
      ini:     document.getElementById('ff-ini-'+i)?.value||'',
      fim:     document.getElementById('ff-fim-'+i)?.value||'',
      dias:    parseInt(document.getElementById('ff-dias-'+i)?.value||0),
      hnoturno:document.getElementById('ff-hnoturno-'+i)?.value||'00:00',
      hextra:  document.getElementById('ff-hextra-'+i)?.value||'00:00',
      feriado: parseInt(document.getElementById('ff-feriado-'+i)?.value||0),
      domingo: parseInt(document.getElementById('ff-domingo-'+i)?.value||0),
      faltas:  parseInt(document.getElementById('ff-faltas-'+i)?.value||0),
    };
  }

  window._finPreenchePix = () => {
    const sel = document.getElementById('fin-forn');
    if (!sel) return;
    const f = FORNECEDORES_FIN.find(x=>x.nome===sel.value);
    const box = document.getElementById('fin-pix-dados');
    if (!box) return;
    if (f && f.pixChave) {
      box.innerHTML = `<strong>Chave PIX (${f.pixTipo}):</strong> ${f.pixChave}<br><strong>Nome:</strong> ${f.pixNome}${f.banco?`<br><strong>Banco:</strong> ${f.banco}`:''}`;
    } else {
      box.innerHTML = `<span style="color:var(--txt2)">Preencha os dados do PIX manualmente no e-mail.</span>`;
    }
  };

  window._finGerarEmail = () => {
    const tipo = document.getElementById('fin-tipo').value;
    let assunto = '', corpo = '';

    if (tipo === 'Boleto') {
      const forn = document.getElementById('fin-forn')?.value || '';
      const item = document.getElementById('fin-item')?.value || '';
      const cc   = document.getElementById('fin-cc')?.value || 'Pizzaria Fornilha.';
      const n    = parseInt(document.getElementById('fin-num-parc')?.value||1);
      const parcelas = [];
      for (let i=0; i<n; i++) {
        const val  = parseFloat(document.getElementById('fin-parc-val-'+i)?.value||0);
        const venc = document.getElementById('fin-parc-venc-'+i)?.value || '';
        parcelas.push({val, venc});
      }
      const primeiroVenc = parcelas[0]?.venc ? fmtDataBr(parcelas[0].venc).slice(0,5) : 'DD/MM';
      assunto = `Lançar e Agendar - ${forn.toUpperCase()} - FORNILHA - VENC. ${primeiroVenc}`;
      const linhasParcelas = parcelas.map(p =>
        `Valor do Boleto: R$ ${p.val.toLocaleString('pt-BR',{minimumFractionDigits:2})}\nVencimento dia ${p.venc ? fmtDataBr(p.venc).slice(0,5) : 'DD/MM'}`
      ).join('\n\n');
      corpo = `Olá Flaviane!\n\nSegue abaixo o boleto a ser lançado no sistema e agendado no banco.\n\nItem: ${item}\nCentro de Custo/Lucro: ${cc}\nFornecedor: ${forn}\n\n${linhasParcelas}\n\nAtenciosamente,\nVinicius Querino — Fornilha Restaurante & Pizzaria`;

    } else if (tipo === 'Salário') {
      const mesRef = (document.getElementById('fin-mes-ref')?.value || mesAtual).toUpperCase();
      const venc = document.getElementById('fin-venc')?.value || '';
      const vencFmt = venc ? fmtDataBr(venc).slice(0,5) : 'DD/MM';
      assunto = `Lançar e Agendar - Salário ref. ao Mês de ${mesRef} - FORNILHA - VENC ${vencFmt}.`;
      const linhas = COLABORADORES_FIN.map((c,i) => {
        const val = parseFloat(document.getElementById('sal_'+i)?.value||0);
        if (!val) return '';
        return `${c.nome} - ${c.cargo}\nChave Pix: (${c.pixTipo}) - ${c.pixChave}${c.banco?`\nBanco: ${c.banco}`:''}\nNome: ${c.nome}\nValor de R$ ${val.toLocaleString('pt-BR',{minimumFractionDigits:2})}\n`;
      }).filter(Boolean);
      corpo = `Olá Flaviane!\n\nSegue abaixo os dados bancários para realização do pagamento dos salários ref. ao mês de ${mesRef}.\n\nItem: Salário ref. ao mês de ${mesRef}.\nCentro de Custo/Lucro: Fornilha\nFornecedor: Colaboradores do FORNILHA\n\nSegue abaixo os colaboradores que DEVERÃO SER PAGOS VIA DEPÓSITO - ${mesRef}.\n\n${linhas.join('\n')}\nAtenciosamente,\nVinicius Querino — Fornilha Restaurante & Pizzaria`;

    } else if (tipo === 'Folha de Pagamento') {
      const subtipo = document.getElementById('fin-subtipo')?.value || 'FUNC. REGISTRADOS';
      const mesRef  = (document.getElementById('fin-mes-ref')?.value || mesAtual).toUpperCase();
      const [mesAbrev] = mesRef.split('/');
      const mesNome = MESES_NOME[MESES_PT.indexOf(mesAbrev.charAt(0)+mesAbrev.slice(1).toLowerCase())] || mesAbrev;
      const n = window._folhaCount || 1;

      if (subtipo === 'FUNC. REGISTRADOS') {
        assunto = `Informação para Elaboração da Folha - FORNILHA - FUNC. REGISTRADOS - ${mesRef}.`;
        const linhas = Array.from({length:n}, (_,i) => {
          const d = getFuncDados(i);
          if (!d.nome) return '';
          const compens = [];
          if (d.feriado > 0) compens.push(`· Compensar ${d.feriado} (${numExtenso(d.feriado)}) FERIADO;`);
          if (d.domingo > 0) compens.push(`· Compensar ${d.domingo} (${numExtenso(d.domingo)}) Domingo do mês;`);
          return `${i+1}- ${d.nome} - ${d.cargo.toUpperCase()}\n· Cargo: ${d.cargo}\n· Salário base: R$ ${d.sal.toLocaleString('pt-BR',{minimumFractionDigits:2})}\n· Data de Início: ${d.ini ? fmtDataBr(d.ini) : '__/__/____'}\n· Último dia de trabalho ${d.fim ? fmtDataBr(d.fim) : '__/__/____'}\n· Dias trabalhados: ${d.dias} Dias\n· Horas com adicional noturno: ${d.hnoturno}hs;\n· Hora extra no mês de ${mesNome.toUpperCase()}: ${d.hextra}hs;\n${compens.join('\n')}${compens.length?'\n':''}· ${faltasTxt(d.faltas)}`;
        }).filter(Boolean);
        corpo = linhas.join('\n\n');
        window.open(`mailto:${DEST_CONTAB}?subject=${encodeURIComponent(assunto)}&body=${encodeURIComponent(corpo)}`);
        return;
      } else {
        // ACERTO POR FORA — abre um mailto por funcionário
        for (let i=0; i<n; i++) {
          const d = getFuncDados(i);
          if (!d.nome) continue;
          assunto = `Informação para Elaboração da Folha - FORNILHA - ACERTO POR FORA - ${d.nome} - ${mesRef}`;
          corpo = `Olá Luciana.\n\nFavor nos enviar o acerto por fora referente ao mês de ${mesRef} - ${d.nome}.\n\nSegue informações para o Acerto por Fora (folha de pagamento):\n· Cargo: ${d.cargo}\n· Salário base: R$ ${d.sal.toLocaleString('pt-BR',{minimumFractionDigits:2})}\n· Data de Início: ${d.ini ? fmtDataBr(d.ini) : '__/__/____'}\n· Último dia de trabalho ${d.fim ? fmtDataBr(d.fim) : '__/__/____'}\n· Dias trabalhados: ${d.dias} Dias.\n· Hora extra no mês de ${mesNome} com adicional noturno: ${d.hnoturno}hs;\n· Hora extra no mês de ${mesNome}: ${d.hextra}hs;\n· ${faltasTxt(d.faltas)}`;
          window.open(`mailto:${DEST_CONTAB}?subject=${encodeURIComponent(assunto)}&body=${encodeURIComponent(corpo)}`);
        }
        return;
      }

    } else {
      const item  = document.getElementById('fin-item')?.value || '';
      const fornEl = document.getElementById('fin-forn');
      const forn  = fornEl?.value || '';
      const val   = parseFloat(document.getElementById('fin-valor')?.value||0);
      const cc    = document.getElementById('fin-cc')?.value || 'Fornilha';
      const venc  = document.getElementById('fin-venc')?.value || '';
      const vencFmt = venc ? fmtDataBr(venc).slice(0,5) : 'DD/MM';
      const valFmt = val ? `R$ ${val.toLocaleString('pt-BR',{minimumFractionDigits:2})}` : '';
      let dadosPix = '';
      if (tipo === 'PIX') {
        const f = FORNECEDORES_FIN.find(x=>x.nome===forn);
        if (f?.pixChave) dadosPix = `\nChave Pix: (${f.pixTipo}) - ${f.pixChave}\nNome: ${f.pixNome}${f.banco?`\nBanco: ${f.banco}`:''}`;
      }
      assunto = `Lançar e Agendar - ${(item||forn).toUpperCase()} - FORNILHA - VENC. ${vencFmt}`;
      corpo = `Olá Flaviane!\n\nSegue abaixo os dados para realização do pagamento.\n\nItem: ${item||forn}\nCentro de Custo/Lucro: ${cc}\nFornecedor: ${forn}\n\nValor: ${valFmt}\nVencimento dia ${vencFmt}${dadosPix}\n\nAtenciosamente,\nVinicius Querino — Fornilha Restaurante & Pizzaria`;
    }

    window.open(`mailto:${DEST_FLAVIANE}?subject=${encodeURIComponent(assunto)}&body=${encodeURIComponent(corpo)}`);
  };

  window._finSalvar = async () => {
    const tipo = document.getElementById('fin-tipo').value;
    if (tipo === 'Boleto') {
      const forn = document.getElementById('fin-forn')?.value || '';
      const item = document.getElementById('fin-item')?.value || '';
      const cc   = document.getElementById('fin-cc')?.value || '';
      const n    = parseInt(document.getElementById('fin-num-parc')?.value||1);
      let totalGeral = 0;
      let primeiroVenc = '';
      for (let i=0; i<n; i++) {
        totalGeral += parseFloat(document.getElementById('fin-parc-val-'+i)?.value||0);
        if (i===0) primeiroVenc = document.getElementById('fin-parc-venc-0')?.value || '';
      }
      if (!forn) { showT('⚠️ Informe o fornecedor'); return; }
      await savePagamento({tipo, fornecedor:forn, item, valor:totalGeral, vencimento:primeiroVenc, cc, parcelas:n});
    } else if (tipo === 'Salário') {
      const mesRef = document.getElementById('fin-mes-ref')?.value || mesAtual;
      const venc   = document.getElementById('fin-venc')?.value || '';
      const total  = COLABORADORES_FIN.reduce((s,c,i)=>s+(parseFloat(document.getElementById('sal_'+i)?.value||0)),0);
      await savePagamento({tipo, fornecedor:'Colaboradores do FORNILHA', item:`Salário ${mesRef}`, valor:total, vencimento:venc, cc:'Fornilha', parcelas:1});
    } else if (tipo === 'Folha de Pagamento') {
      const subtipo = document.getElementById('fin-subtipo')?.value || 'FUNC. REGISTRADOS';
      const mesRef  = document.getElementById('fin-mes-ref')?.value || mesAtual;
      const n = window._folhaCount || 1;
      const nomes = Array.from({length:n}, (_,i) => document.getElementById('ff-nome-'+i)?.value||'').filter(Boolean).join(', ');
      await savePagamento({tipo, fornecedor: subtipo, item: `Folha ${mesRef} — ${nomes}`, valor: 0, vencimento: null, cc: 'Fornilha', parcelas: n});
    } else {
      const item  = document.getElementById('fin-item')?.value || '';
      const fornEl = document.getElementById('fin-forn');
      const forn  = typeof fornEl?.value === 'string' ? fornEl.value : '';
      const val   = parseFloat(document.getElementById('fin-valor')?.value||0);
      const cc    = document.getElementById('fin-cc')?.value || '';
      const venc  = document.getElementById('fin-venc')?.value || '';
      if (!item && !forn) { showT('⚠️ Informe o item ou fornecedor'); return; }
      await savePagamento({tipo, fornecedor:forn, item, valor:val, vencimento:venc, cc, parcelas:1});
    }
    showT('✅ Pagamento salvo no histórico!');
    window._finTab('hist');
  };

  window._finAtualizaForm();
}

};

window.abrirFormTarefa=(tipo)=>{

  } else {
    formExtra=`
      <div class="fld"><label>Título</label><input id="nt-tit" placeholder="Descreva a tarefa..."></div>
      <div class="fld"><label>Setor</label>
        <select id="nt-setor">${['Cozinha','Pizzaria','Bar','Salão','Caixa','Gestão'].map(s=>`<option>${s}</option>`).join('')}</select></div>
      <div class="fld"><label>Responsável</label>
        <select id="nt-resp">${EQUIPE_LOCAL.map(e=>`<option value="${e.nome}|${e.tel}">${e.nome.split(' ')[0]}</option>`).join('')}</select></div>
      <div class="fld"><label>Descrição</label><textarea id="nt-desc" placeholder="Detalhes..." rows="3"></textarea></div>`;
  }
  document.getElementById('modal-inner').innerHTML=`
    <h3>${tp.icon} ${tp.label}</h3>
    ${formExtra}
    <div class="fld"><label>Prazo</label><input type="date" id="nt-prazo" value="${hoje}"></div>
    <div class="mbtns">
      <button class="btn-cancel" onclick="abrirNovaTarefa()">← Voltar</button>
      <button class="btn-ok" onclick="criarTar('${tipo}','${setorFixed}','${respFixed}')">Criar e enviar</button>

};

window.atualizaRespProd=(setor)=>{
  const p=setor==='Cozinha'?'cozinha':'pizzaria';
  const el=document.getElementById('nt-resp'); if(!el)return;
  el.innerHTML=EQUIPE_LOCAL.filter(e=>e.perfil===p).map(e=>`<option value="${e.nome}|${e.tel}">${e.nome.split(' ')[0]}</option>`).join('');
};

window.criarTar=(tipo,setorFixed,respFixed)=>{
  const prazo=document.getElementById('nt-prazo').value;
  const prazoFmt=new Date(prazo+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  let setor,resp,tel,titulo;
  if(tipo==='caixa'){
    setor='Caixa'; resp=respFixed||'Patricia'; tel='';
    titulo=`Conferência do Caixa — ${prazoFmt}`;
  } else if(tipo==='outro'){
    const tit=document.getElementById('nt-tit')?.value.trim();
    if(!tit){showT('Informe o título');return}
    setor=document.getElementById('nt-setor').value;
    const rv=(document.getElementById('nt-resp')?.value||'').split('|');
    resp=rv[0]; tel=rv[1]||''; titulo=tit;
  } else {
    setor=document.getElementById('nt-setor')?.value||'Cozinha';
    const rv=(document.getElementById('nt-resp')?.value||'').split('|');
    resp=rv[0]; tel=rv[1]||'';
    const nomes={producao:'Contagem de Produção',estoque:'Contagem de Estoque'};
    titulo=`${nomes[tipo]} — ${setor} — ${prazoFmt}`;
  }
  const novo={id:Date.now(),tipo,titulo,setor,resp,tel,prazo,status:'pendente',dados:{}};
  tarefas.unshift(novo);
  saveTarefa(novo);
  const tp=TIPOS_TAR[tipo];
  posts.unshift({autor:nome,cargo:'Gestão',cor:EQUIPE_LOCAL.find(e=>e.nome===nome)?.cor||'#8B1A1A',
    badge:'tag-a',bl:'Tarefa',setor,
    txt:`${tp.icon} <strong>${titulo}</strong><br>Responsável: ${resp} · Prazo: ${prazoFmt}`,
    mediaUrl:'',mediaName:'',extra:'',time:'Agora'});
  fecharModal(); goTo('tarefas'); showT('Tarefa criada e enviada!');
};

async function askAI(){
  const q=document.getElementById('ai-q')?.value?.trim();
  if(!q)return;
  const resp=document.getElementById('ai-resp');
  const load=document.getElementById('ai-load');
  if(!resp||!load)return;
  document.getElementById('ai-q').value='';
  resp.style.opacity='0.5';
  load.style.display='flex';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,messages:[{role:'user',content:CTX_FORNILHA+' '+q}]})
    });
    const d=await r.json();
    load.style.display='none';
    resp.style.opacity='1';
    resp.textContent=d.content?.[0]?.text||'Não foi possível obter resposta.';
  }catch(e){
    load.style.display='none';
    resp.style.opacity='1';
    resp.textContent='Erro de conexão. Tente novamente.';
  }
}
